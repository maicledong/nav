<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航后台｜完整全功能自动版</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft Yahei", system-ui; background: #f4f6f8; padding: 20px; }
    .wrap { max-width: 1100px; margin: auto; background: white; padding: 24px; border-radius: 12px; }
    h2 { margin-bottom: 16px; }
    .section { border: 1px solid #e5e7eb; padding: 16px; margin: 16px 0; border-radius: 8px; background: white; }
    .sub-section { border: 1px dashed #d1d5eb; padding: 12px; margin: 10px 0; border-radius: 6px; background: #f9fafb; }
    input { width: 100%; padding: 6px 8px; margin: 4px 0; border: 1px solid #e5e7eb; border-radius: 6px; }

    .category-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .id-input { flex: 1; }
    .name-input { flex: 2; }
    .icon-select {
      flex: 1;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .site-row { 
      display: grid; 
      grid-template-columns: 1fr auto 1fr 1fr 1.5fr 42px 42px 42px; 
      gap: 4px; 
      padding: 6px; 
      align-items: center; 
      background: white; 
      border: 1px solid #eee; 
      border-radius: 6px; 
      margin-top: 4px; 
    }

    .btn { 
      padding: 4px 2px; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 12px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1.2;
      width: 36px;
      height: 40px;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-copy { background: #f59e0b; color: white; }
    .btn-move { background: #6366f1; color: white; }
    .btn-pink { background: #ec4899; color: white; }
    .btn-gray { background: #9ca3af; color: white; }
    .btn-upload { 
      background: #10b981; 
      color: white;
      writing-mode: initial;
      width: 50px;
      height: 32px;
      padding: 2px 4px;
    }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .copy-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    .copy-item:hover { background: #f3f4f6; }
    .copy-item.selected { background: #dbeafe; }
    .modal-footer { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    #status { margin: 10px 0; font-weight: bold; color: #2563eb; }
    .dragging { opacity: 0.5; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>🧭 导航后台管理</h2>
  <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;margin-right:8px;" onclick="saveToGitHub()">💾 一键保存到 GitHub</button>
  <div id="status">加载中...</div>
  <div id="categories"></div>
</div>

<div class="modal" id="uploadModal">
  <div class="modal-box">
    <h3>上传网站 Logo</h3>
    <input type="file" id="logoFileInput" accept="image/*">
    <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-upload" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="uploadLogo()">上传并填充路径</button>
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeUploadModal()">取消</button>
    </div>
  </div>
</div>

<div class="modal" id="copyModal">
  <div class="modal-box">
    <h3>复制到位置（先选，再确认）</h3>
    <div id="copyTargets"></div>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeCopyModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmPasteCopy()">确认复制</button>
    </div>
  </div>
</div>

<div class="modal" id="moveSiteModal">
  <div class="modal-box">
    <h3>移动网站到位置（先选，再确认）</h3>
    <div id="moveSiteTargets"></div>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeMoveSiteModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmMoveSite()">确认移动</button>
    </div>
  </div>
</div>

<div class="modal" id="moveSubModal">
  <div class="modal-box">
    <h3>移动子分类至大分类</h3>
    <select id="targetSubCat" style="width:100%; padding:8px; margin:12px 0;"></select>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeMoveSubModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmMoveSubCategory()">确认移动</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.6.1/dist/jsrsasign-all-min.js"></script>

<script>
// ========== 关键修复：不使用 process.env，直接读全局 PUBLIC_ 变量 ==========
const GITHUB_APP_ID = window.PUBLIC_GITHUB_APP_ID || "3663516";
const PRIVATE_KEY = window.PUBLIC_GITHUB_PRIVATE_KEY || "";

const cnNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四'];
const commonIcons = [
  { text: '⭐ 空心星星', value: 'far fa-star fa-lg' },
  { text: '🔧 常用工具', value: 'fas fa-tools fa-lg' },
  { text: '🎬 电影胶卷', value: 'fas fa-film fa-lg' },
  { text: '🖼️ 图片素材', value: 'fas fa-image fa-lg' },
  { text: '🎵 音乐电台', value: 'fas fa-music fa-lg' },
  { text: '🎨 设计创意', value: 'fas fa-palette fa-lg' },
  { text: '💻 技术开发', value: 'fas fa-code fa-lg' },
  { text: '⚙️ 系统设置', value: 'fas fa-cog fa-lg' },
  { text: '🌐 全球网络', value: 'fas fa-globe fa-lg' },
  { text: '📱 手机应用', value: 'fas fa-mobile-alt fa-lg' },
  { text: '🔗 链接聚合', value: 'fas fa-link fa-lg' },
  { text: '📁 文件夹', value: 'fas fa-folder fa-lg' },
  { text: '💼 办公效率', value: 'fas fa-briefcase fa-lg' },
  { text: '📚 学习教育', value: 'fas fa-book fa-lg' },
  { text: '✏️ 编辑铅笔', value: 'fas fa-pen fa-lg' },
  { text: '🧠 学习大脑', value: 'fas fa-brain fa-lg' },
  { text: '📈 数据分析', value: 'fas fa-chart-line fa-lg' },
  { text: '💰 金融理财', value: 'fas fa-coins fa-lg' },
  { text: '👥 社交社区', value: 'fas fa-users fa-lg' },
  { text: '🏠 生活服务', value: 'fas fa-home fa-lg' },
  { text: '💖 爱心收藏', value: 'far fa-heart fa-lg' },
  { text: '🏥 健康医疗', value: 'fas fa-hospital fa-lg' },
  { text: 'ℹ️ 咨询信息', value: 'fas fa-info-circle fa-lg' },
  { text: '📰 新闻资讯', value: 'fas fa-newspaper fa-lg' },
  { text: '🎮 游戏娱乐', value: 'fas fa-gamepad fa-lg' },
  { text: '🛒 购物电商', value: 'fas fa-shopping-cart fa-lg' },
  { text: '🔍 搜索查找', value: 'fas fa-search fa-lg' },
  { text: '🗺️ 旅行地图', value: 'fas fa-map-marked-alt fa-lg' }
];

var GITHUB_CONFIG = {
  APP_ID: GITHUB_APP_ID,
  OWNER: "maicledong",
  REPO: "nav",
  BRANCH: "master",
  LOGO_DIR: "assets/images/logos/"
};

var navConfig = { categories: [] };
var copySite = null;
var copyTarget = null;
var movingSite = null;
var moveSiteTarget = null;
var movingSub = null;
var pendingLogoInputEl = null;
let hasSubmitted = false;

// 生成JWT
function getJWT() {
  if (!PRIVATE_KEY) {
    showStatus("❌ 未读取到环境变量密钥，请检查Cloudflare Pages的PUBLIC_GITHUB_PRIVATE_KEY配置");
    return null;
  }
  const now = Math.floor(Date.now() / 1000);
  return KJUR.jws.JWS.sign('RS256',
    JSON.stringify({ alg: 'RS256', typ: 'JWT' }),
    JSON.stringify({ iss: GITHUB_CONFIG.APP_ID, iat: now - 10, exp: now + 300 }),
    PRIVATE_KEY
  );
}

async function getInstallationId(jwt) {
  const res = await fetch('https://api.github.com/app/installations', {
    headers: { Authorization: `Bearer ${jwt}`, Accept: 'application/vnd.github.v3+json' }
  });
  const list = await res.json();
  return list.find(i => i.account.login === GITHUB_CONFIG.OWNER).id;
}

async function getInstallToken(jwt, id) {
  const res = await fetch(`https://api.github.com/app/installations/${id}/access_tokens`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${jwt}`, Accept: 'application/vnd.github.v3+json' }
  });
  const data = await res.json();
  return data.token;
}

async function load() {
  showStatus('⌛ 加载中...');
  if(hasSubmitted && navConfig.categories.length > 0) {
    render();
    showStatus('✅ 使用本地已修改配置');
    return;
  }
  try {
    const timestamp = Date.now();
    const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/nav-config.json?t=${timestamp}`);
    navConfig = await res.json();
  } catch(e) {
    showStatus('⚠️ 拉取线上配置失败，使用空配置');
  }
  render();
  showStatus('✅ 加载完成，可直接修改保存');
}

function render() {
  function generateRandom32Id() {
    const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
    let id = '';
    for (let i = 0; i < 30; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id + '01';
  }

  navConfig.categories.forEach(cat => {
    if (!cat.id || cat.id.length !== 32) cat.id = generateRandom32Id();
    if (typeof cat.expanded === 'undefined') cat.expanded = true;
  });

  const idSet = new Set();
  navConfig.categories.forEach(cat => {
    while (idSet.has(cat.id)) cat.id = generateRandom32Id();
    idSet.add(cat.id);
  });

  let html = '';
  navConfig.categories.forEach((cat, i) => {
    const bigTitle = `${cnNums[i]}、${cat.name}`;
    const isExpanded = cat.expanded !== false;
    const toggleIcon = isExpanded ? '⏬' : '⏵';
    const hasSub = cat.subCategories && cat.subCategories.length > 0;
    const bigAddBtnClass = hasSub ? 'btn-gray' : 'btn-pink';

    let iconOptions = '';
    commonIcons.forEach(icon => {
      const selected = cat.icon === icon.value ? 'selected' : '';
      iconOptions += `<option value="${icon.value}" ${selected}>${icon.text}</option>`;
    });

    html += `
    <div class="section" data-idx="${i}">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <button class="btn" style="writing-mode:initial;width:32px;height:auto;padding:0;border:none;background:none;font-size:16px;color:#666;" onclick="toggleCategory(${i})">${toggleIcon}</button>
        <h3 style="margin:0;">${bigTitle}</h3>
        <div style="display:flex; gap:6px;">
          <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="addSubCategory(${i})">➕ 新增子分类</button>
          <button class="btn ${bigAddBtnClass}" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="addSite(${i},-1)">➕ 添加网站</button>
          <button class="btn btn-danger" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="deleteCategory(${i})">🗑 删除</button>
        </div>
        <div style="width:30px;"></div>
        <div style="display:flex; gap:6px; margin-left:auto;">
          <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="addCategoryBefore(${i})">↑ 插入上</button>
          <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="addCategoryAfter(${i})">↓ 插入下</button>
        </div>
      </div>

      <div class="category-row">
        <input class="id-input" value="${cat.id}" disabled style="background:#f5f5f5;">
        <input class="name-input" placeholder="分类名" value="${cat.name}" oninput="updateCatName(${i},this.value)">
        <select class="icon-select" onchange="updateCatIcon(${i},this.value)">
          ${iconOptions}
        </select>
      </div>

      <div class="category-content" style="${isExpanded ? '' : 'display: none;'}">
        <div class="site-list" data-cat="${i}" data-sub="-1"></div>
        <div class="sub-list" data-cat="${i}">`;

    const subs = cat.subCategories || [];
    subs.forEach((sub, k) => {
      const subTitle = `${k + 1}、${sub.name}`;
      html += `
      <div class="sub-section" data-idx="${k}">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
          <h4 style="margin:0;">${subTitle}</h4>
          <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="openMoveSubCategory(${i},${k})">📋 移动</button>
          <div style="display:flex; gap:6px;">
            <button class="btn btn-pink" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="addSite(${i},${k})">➕ 添加网站</button>
            <button class="btn btn-danger" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="deleteSubCategory(${i},${k})">🗑 删除</button>
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:6px;">
          <input value="${sub.id || ''}" disabled style="background:#f5f5f5; flex:1;">
          <input placeholder="子分类名" value="${sub.name}" oninput="updateSubName(${i},${k},this.value)" style="flex:2;">
        </div>

        <div class="site-list" data-cat="${i}" data-sub="${k}"></div>
      </div>`;
    });

    html += `</div></div></div>`;
  });

  document.getElementById('categories').innerHTML = html;
  renderAllSites();
  initDrag();
}

function toggleCategory(i) {
  navConfig.categories[i].expanded = !navConfig.categories[i].expanded;
  render();
}

function updateCatName(i, val) {
  navConfig.categories[i].name = val;
}
function updateCatIcon(i, val) {
  navConfig.categories[i].icon = val;
}
function updateSubName(i,k,val) {
  navConfig.categories[i].subCategories[k].name = val;
}

function renderAllSites() {
  document.querySelectorAll('.site-list').forEach(el => {
    const catIdx = el.dataset.cat;
    const subIdx = el.dataset.sub;
    const cat = navConfig.categories[catIdx];
    let list = [];
    if(subIdx == -1) {
      list = cat.sites || [];
    } else {
      list = (cat.subCategories[subIdx]?.sites) || [];
    }
    let h = '';
    list.forEach((s,j) => {
      h += `
      <div class="site-row" data-idx="${j}">
        <input value="${s.logo||''}" oninput="updateSite(${catIdx},${subIdx},${j},'logo',this.value)" id="logo-${catIdx}-${subIdx}-${j}">
        <button class="btn btn-upload" onclick="openUploadModal('logo-${catIdx}-${subIdx}-${j}')">上传</button>
        <input value="${s.name||''}" oninput="updateSite(${catIdx},${subIdx},${j},'name',this.value)">
        <input value="${s.url||''}" oninput="updateSite(${catIdx},${subIdx},${j},'url',this.value)">
        <input value="${s.desc||''}" oninput="updateSite(${catIdx},${subIdx},${j},'desc',this.value)">
        <button class="btn btn-move" onclick="openMoveSite(${catIdx},${subIdx},${j})">移</button>
        <button class="btn btn-copy" onclick="openCopySite(${catIdx},${subIdx},${j})">复</button>
        <button class="btn btn-danger" onclick="deleteSite(${catIdx},${subIdx},${j})">删</button>
      </div>`;
    });
    el.innerHTML = h;
  });
}

function initDrag() {
  const bigContainer = document.getElementById('categories');
  new Sortable(bigContainer, {
    animation:150,
    ghostClass:'dragging',
    onEnd:e=>{
      const list = navConfig.categories;
      const item = list.splice(e.oldIndex,1)[0];
      list.splice(e.newIndex,0,item);
      render();
    }
  });
}

function addCategoryBefore(i){
  navConfig.categories.splice(i,0,{name:'新分类',icon:'fas fa-folder fa-lg',expanded:true,sites:[],subCategories:[]});
  render();
}
function addCategoryAfter(i){
  navConfig.categories.splice(i+1,0,{name:'新分类',icon:'fas fa-folder fa-lg',expanded:true,sites:[],subCategories:[]});
  render();
}
function deleteCategory(i){
  if(!confirm('确定删除该大分类？'))return;
  navConfig.categories.splice(i,1);
  render();
}
function addSubCategory(i){
  if(!navConfig.categories[i].subCategories) navConfig.categories[i].subCategories = [];
  navConfig.categories[i].subCategories.push({name:'新子分类',id:'',sites:[]});
  render();
}
function deleteSubCategory(i,k){
  if(!confirm('确定删除该子分类？'))return;
  navConfig.categories[i].subCategories.splice(k,1);
  render();
}
function addSite(i,sub){
  if(sub == -1){
    if(!navConfig.categories[i].sites) navConfig.categories[i].sites = [];
    navConfig.categories[i].sites.push({logo:'',name:'',url:'',desc:''});
  }else{
    if(!navConfig.categories[i].subCategories[sub].sites) navConfig.categories[i].subCategories[sub].sites = [];
    navConfig.categories[i].subCategories[sub].sites.push({logo:'',name:'',url:'',desc:''});
  }
  render();
}
function updateSite(cat,sub,j,key,val){
  let list;
  if(sub == -1) list = navConfig.categories[cat].sites;
  else list = navConfig.categories[cat].subCategories[sub].sites;
  list[j][key] = val;
}
function deleteSite(cat,sub,j){
  if(!confirm('确定删除该网站？'))return;
  let list;
  if(sub == -1) list = navConfig.categories[cat].sites;
  else list = navConfig.categories[cat].subCategories[sub].sites;
  list.splice(j,1);
  render();
}

function openCopySite(cat,sub,j){
  copySite = {cat,sub,j};
  copyTarget = null;
  const list = [];
  navConfig.categories.forEach((c,i)=>{
    list.push({t:'main',cat:i,sub:-1,name:c.name});
    (c.subCategories||[]).forEach((s,k)=>{
      list.push({t:'sub',cat:i,sub:k,name:'　　'+s.name});
    });
  });
  let html = '';
  list.forEach((item,idx)=>{
    html += `<div class="copy-item" id="copyItem${idx}" onclick="selectCopyTarget(${item.cat},${item.sub},${idx})">${item.name}</div>`;
  });
  document.getElementById('copyTargets').innerHTML = html;
  document.getElementById('copyModal').style.display = 'flex';
}
function selectCopyTarget(cat,sub,idx){
  copyTarget = {cat,sub};
  document.querySelectorAll('.copy-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('copyItem'+idx).classList.add('selected');
}
function confirmPasteCopy(){
  if(!copySite||!copyTarget){alert('请先选择目标位置');return;}
  let sourceList;
  if(copySite.sub == -1) sourceList = navConfig.categories[copySite.cat].sites;
  else sourceList = navConfig.categories[copySite.cat].subCategories[copySite.sub].sites;
  const item = JSON.parse(JSON.stringify(sourceList[copySite.j]));

  let targetList;
  if(copyTarget.sub == -1){
    if(!navConfig.categories[copyTarget.cat].sites) navConfig.categories[copyTarget.cat].sites = [];
    targetList = navConfig.categories[copyTarget.cat].sites;
  }else{
    if(!navConfig.categories[copyTarget.cat].subCategories[copyTarget.sub].sites) navConfig.categories[copyTarget.cat].subCategories[copyTarget.sub].sites = [];
    targetList = navConfig.categories[copyTarget.cat].subCategories[copyTarget.sub].sites;
  }
  targetList.push(item);
  closeCopyModal();
  render();
  showStatus('✅ 复制成功');
}
function closeCopyModal(){
  document.getElementById('copyModal').style.display = 'none';
  copySite = null;
  copyTarget = null;
}

function openMoveSite(cat,sub,j){
  movingSite = {cat,sub,j};
  moveSiteTarget = null;
  const list = [];
  navConfig.categories.forEach((c,i)=>{
    list.push({t:'main',cat:i,sub:-1,name:c.name});
    (c.subCategories||[]).forEach((s,k)=>{
      list.push({t:'sub',cat:i,sub:k,name:'　　'+s.name});
    });
  });
  let html = '';
  list.forEach((item,idx)=>{
    html += `<div class="copy-item" id="moveItem${idx}" onclick="selectMoveSiteTarget(${item.cat},${item.sub},${idx})">${item.name}</div>`;
  });
  document.getElementById('moveSiteTargets').innerHTML = html;
  document.getElementById('moveSiteModal').style.display = 'flex';
}
function selectMoveSiteTarget(cat,sub,idx){
  moveSiteTarget = {cat,sub};
  document.querySelectorAll('.copy-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('moveItem'+idx).classList.add('selected');
}
function confirmMoveSite(){
  if(!movingSite||!moveSiteTarget){alert('请先选择目标位置');return;}
  let sourceList;
  if(movingSite.sub == -1) sourceList = navConfig.categories[movingSite.cat].sites;
  else sourceList = navConfig.categories[movingSite.cat].subCategories[movingSite.sub].sites;
  const item = sourceList.splice(movingSite.j,1)[0];

  let targetList;
  if(moveSiteTarget.sub == -1){
    if(!navConfig.categories[moveSiteTarget.cat].sites) navConfig.categories[moveSiteTarget.cat].sites = [];
    targetList = navConfig.categories[moveSiteTarget.cat].sites;
  }else{
    if(!navConfig.categories[moveSiteTarget.cat].subCategories[moveSiteTarget.sub].sites) navConfig.categories[moveSiteTarget.cat].subCategories[moveSiteTarget.sub].sites = [];
    targetList = navConfig.categories[moveSiteTarget.cat].subCategories[moveSiteTarget.sub].sites;
  }
  targetList.push(item);
  closeMoveSiteModal();
  render();
  showStatus('✅ 移动成功');
}
function closeMoveSiteModal(){
  document.getElementById('moveSiteModal').style.display = 'none';
  movingSite = null;
  moveSiteTarget = null;
}

function openMoveSubCategory(fromCat,subIdx){
  movingSub = {fromCat,subIdx};
  const sel = document.getElementById('targetSubCat');
  sel.innerHTML = '';
  navConfig.categories.forEach((c,i)=>{
    sel.innerHTML += `<option value="${i}">${cnNums[i]}、${c.name}</option>`;
  });
  document.getElementById('moveSubModal').style.display = 'flex';
}
function confirmMoveSubCategory(){
  const toCat = document.getElementById('targetSubCat').value;
  const {fromCat,subIdx} = movingSub;
  const subItem = navConfig.categories[fromCat].subCategories.splice(subIdx,1)[0];
  if(!navConfig.categories[toCat].subCategories) navConfig.categories[toCat].subCategories = [];
  navConfig.categories[toCat].subCategories.push(subItem);
  closeMoveSubModal();
  render();
  showStatus('✅ 子分类移动成功');
}
function closeMoveSubModal(){
  document.getElementById('moveSubModal').style.display = 'none';
  movingSub = null;
}

function openUploadModal(inputId){
  pendingLogoInputEl = document.getElementById(inputId);
  document.getElementById('logoFileInput').value = '';
  document.getElementById('uploadModal').style.display = 'flex';
}
function closeUploadModal(){
  document.getElementById('uploadModal').style.display = 'none';
  pendingLogoInputEl = null;
}
async function uploadLogo(){
  const file = document.getElementById('logoFileInput').files[0];
  if(!file) return alert('请选择图片');
  if(!PRIVATE_KEY){
    showStatus('❌ 无密钥，无法上传');
    return;
  }
  showStatus(`⌛ 正在上传 ${file.name}...`);
  try {
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async function(){
      const base64 = reader.result.split(',')[1];
      const path = GITHUB_CONFIG.LOGO_DIR + file.name;

      let sha = null;
      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}?ref=${GITHUB_CONFIG.BRANCH}`, {
          headers: { Authorization: `token ${token}` }
        });
        if(res.ok){
          const data = await res.json();
          sha = data.sha;
        }
      }catch(e){}

      const putRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `token ${token}`,
          'Content-Type':'application/json'
        },
        body: JSON.stringify({
          message: `Upload logo: ${file.name}`,
          content: base64,
          sha: sha,
          branch: GITHUB_CONFIG.BRANCH
        })
      });
      if(putRes.ok){
        if(pendingLogoInputEl){
          pendingLogoInputEl.value = path;
          pendingLogoInputEl.dispatchEvent(new Event('input'));
        }
        showStatus(`✅ ${file.name} 上传成功`);
        closeUploadModal();
        renderAllSites();
      }else{
        showStatus('❌ 上传失败');
      }
    }
  } catch (e) {
    showStatus('❌ 上传异常：'+e.message);
  }
}

async function saveToGitHub() {
  if(!PRIVATE_KEY){
    showStatus('❌ 未读取到环境变量密钥，无法保存');
    return;
  }
  showStatus('⌛ 提交中...');
  try {
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    const path = 'nav-config.json';
    let sha = null;
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}?ref=${GITHUB_CONFIG.BRANCH}`, {
        headers: { Authorization: `token ${token}` }
      });
      if(res.ok){
        const info = await res.json();
        sha = info.sha;
      }
    }catch(e){}

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(navConfig, null, 2))));
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "更新导航配置", content, sha, branch: GITHUB_CONFIG.BRANCH })
    });
    showStatus("✅ 保存成功！任意设备打开自动生效");
    alert("✅ 保存成功");
  } catch (e) {
    showStatus("❌ 保存失败：" + e.message);
    console.error(e);
  }
}

function showStatus(t) {
  document.getElementById("status").innerText = t;
}

window.onload = load;
</script>
