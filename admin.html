<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航后台｜全自动云端版</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft Yahei", system-ui; background: #f4f6f8; padding: 20px; }
    .wrap { max-width: 1100px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; }
    h2 { margin-bottom: 16px; }
    .section { border: 1px solid #e5e7eb; padding: 16px; margin: 16px 0; border-radius: 8px; }
    .sub-section { border: 1px dashed #d1d5eb; padding: 12px; margin: 10px 0; border-radius: 6px; background: #f9fafb; }
    input { width: 100%; padding: 6px 8px; margin: 4px 0; border: 1px solid #e5e7eb; border-radius: 6px; }
    .category-row { display: flex; gap: 8px; align-items: center; }
    .id-input { flex: 1; }
    .name-input { flex: 2; }
    .icon-select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid #ddd; }
    .site-row { 
      display: grid; 
      grid-template-columns: 1fr auto 1fr 1fr 1.5fr 42px 42px 42px; 
      gap: 4px; padding: 6px; align-items: center;
      background: #fff; border: 1px solid #eee; border-radius: 6px; margin-top: 4px;
    }
    .btn { 
      padding: 4px 2px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px;
      writing-mode: vertical-rl; text-orientation: upright;
      width: 36px; height: 40px;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-copy { background: #f59e0b; color: #fff; }
    .btn-move { background: #6366f1; color: #fff; }
    .btn-pink { background: #ec4899; color: #fff; }
    .btn-gray { background: #9ca3af; color: #fff; }
    .btn-upload { 
      background: #10b981; color: #fff;
      writing-mode: initial; width: 50px; height: 32px; padding: 2px 4px;
    }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); 
      display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: #fff; padding: 20px; border-radius: 10px; 
      width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .copy-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    .copy-item:hover { background: #f3f4f6; }
    .copy-item.selected { background: #dbeafe; }
    .modal-footer { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    #status { margin: 10px 0; font-weight: bold; color: #2563eb; }
    .dragging { opacity: 0.5; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>🧭 导航后台管理</h2>
  <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;margin-right:8px;" onclick="saveToGitHub()">💾 一键保存到 GitHub</button>
  <div id="status">✅ 已自动就绪，可直接修改保存</div>
  <div id="categories"></div>
</div>

<div class="modal" id="uploadModal">
  <div class="modal-box">
    <h3>上传网站 Logo</h3>
    <input type="file" id="logoFileInput" accept="image/*">
    <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-upload" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="uploadLogo()">上传并填充路径</button>
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeUploadModal()">取消</button>
    </div>
  </div>
</div>

<div class="modal" id="copyModal">
  <div class="modal-box">
    <h3>复制到位置（先选，再确认）</h3>
    <div id="copyTargets"></div>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeCopyModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmPasteCopy()">确认复制</button>
    </div>
  </div>
</div>

<div class="modal" id="moveSiteModal">
  <div class="modal-box">
    <h3>移动网站到位置（先选，再确认）</h3>
    <div id="moveSiteTargets"></div>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeMoveSiteModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmMoveSite()">确认移动</button>
    </div>
  </div>
</div>

<div class="modal" id="moveSubModal">
  <div class="modal-box">
    <h3>移动子分类至大分类</h3>
    <select id="targetSubCat" style="width:100%; padding:8px; margin:12px 0;"></select>
    <div class="modal-footer">
      <button class="btn" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="closeMoveSubModal()">取消</button>
      <button class="btn btn-primary" style="writing-mode:initial;width:auto;height:auto;padding:6px 10px;" onclick="confirmMoveSubCategory()">确认移动</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
const cnNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四'];
const commonIcons = [
  { text: '⭐ 空心星星', value: 'far fa-star fa-lg' },
  { text: '🔧 常用工具', value: 'fas fa-tools fa-lg' },
  { text: '🎬 电影胶卷', value: 'fas fa-film fa-lg' },
  { text: '🖼️ 图片素材', value: 'fas fa-image fa-lg' },
  { text: '🎵 音乐电台', value: 'fas fa-music fa-lg' },
  { text: '🎨 设计创意', value: 'fas fa-palette fa-lg' },
  { text: '💻 技术开发', value: 'fas fa-code fa-lg' },
  { text: '⚙️ 系统设置', value: 'fas fa-cog fa-lg' },
  { text: '🌐 全球网络', value: 'fas fa-globe fa-lg' },
  { text: '📱 手机应用', value: 'fas fa-mobile-alt fa-lg' },
  { text: '🔗 链接聚合', value: 'fas fa-link fa-lg' },
  { text: '📁 文件夹', value: 'fas fa-folder fa-lg' },
  { text: '💼 办公效率', value: 'fas fa-briefcase fa-lg' },
  { text: '📚 学习教育', value: 'fas fa-book fa-lg' },
  { text: '✏️ 编辑铅笔', value: 'fas fa-pen fa-lg' },
  { text: '🧠 学习大脑', value: 'fas fa-brain fa-lg' },
  { text: '📈 数据分析', value: 'fas fa-chart-line fa-lg' },
  { text: '💰 金融理财', value: 'fas fa-coins fa-lg' },
  { text: '👥 社交社区', value: 'fas fa-users fa-lg' },
  { text: '🏠 生活服务', value: 'fas fa-home fa-lg' },
  { text: '💖 爱心收藏', value: 'far fa-heart fa-lg' },
  { text: '🏥 健康医疗', value: 'fas fa-hospital fa-lg' },
  { text: 'ℹ️ 咨询信息', value: 'fas fa-info-circle fa-lg' },
  { text: '📰 新闻资讯', value: 'fas fa-newspaper fa-lg' },
  { text: '🎮 游戏娱乐', value: 'fas fa-gamepad fa-lg' },
  { text: '🛒 购物电商', value: 'fas fa-shopping-cart fa-lg' },
  { text: '🔍 搜索查找', value: 'fas fa-search fa-lg' },
  { text: '🗺️ 旅行地图', value: 'fas fa-map-marked-alt fa-lg' }
];

// 仓库配置
const GIT_CONF = {
  owner: "maicledong",
  repo: "nav",
  branch: "master",
  configPath: "nav-config.json"
};

let navConfig = { categories: [] };
let copySite = null, copyTarget = null;
let movingSite = null, moveSiteTarget = null;
let movingSub = null, pendingLogoInputEl = null;
let fileSha = "";

// 加载配置
async function load() {
  showStatus("⌛ 加载中...");
  try {
    const timestamp = Date.now();
    const res = await fetch(`https://raw.githubusercontent.com/${GIT_CONF.owner}/${GIT_CONF.repo}/${GIT_CONF.branch}/${GIT_CONF.configPath}?t=${timestamp}`);
    navConfig = await res.json();
    // 拿sha
    const infoRes = await fetch(`https://api.github.com/repos/${GIT_CONF.owner}/${GIT_CONF.repo}/contents/${GIT_CONF.configPath}?ref=${GIT_CONF.branch}`);
    const info = await infoRes.json();
    fileSha = info.sha || "";
  } catch (e) {
    showStatus("⚠️ 拉取配置失败，使用空配置");
  }
  render();
  showStatus("✅ 加载完成，可直接修改保存");
}

// 渲染页面
function render() {
  function gen32Id() {
    const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
    let id = '';
    for (let i = 0; i < 30; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id + "01";
  }
  navConfig.categories.forEach(cat => {
    if (!cat.id || cat.id.length !== 32) cat.id = gen32Id();
    if (typeof cat.expanded === "undefined") cat.expanded = true;
  });

  let html = '';
  navConfig.categories.forEach((cat, i) => {
    const title = `${cnNums[i]}、${cat.name || "未命名分类"}`;
    const toggleIcon = cat.expanded ? "⏬" : "⏵";
    const hasSub = cat.sites && cat.sites.length > 0;
    const btnClass = hasSub ? "btn-gray" : "btn-pink";

    let iconOpt = '';
    commonIcons.forEach(icon => {
      const sel = cat.icon === icon.value ? "selected" : "";
      iconOpt += `<option value="${icon.value}" ${sel}>${icon.text}</option>`;
    });

    html += `
    <div class="section" data-cat-idx="${i}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <button class="btn" style="writing-mode:initial;width:32px;height:auto;padding:0;border:none;background:none;font-size:16px;color:#666;" onclick="toggleCat(${i})">${toggleIcon}</button>
        <h3 style="margin:0;flex:1;">${title}</h3>
        <div style="display:flex;gap:6px;">
          <button class="btn ${btnClass}" style="writing-mode:initial;width:auto;height:auto;padding:4px 8px;" onclick="addSite(${i})">➕ 添加网站</button>
          <button class="btn btn-danger" style="writing-mode:initial;width:auto;height:auto;padding:4px 8px;" onclick="delCat(${i})">🗑 删除分类</button>
        </div>
      </div>
      <div class="category-row">
        <input class="id-input" value="${cat.id}" disabled style="background:#f5f5f5;">
        <input class="name-input" placeholder="分类名称" value="${cat.name || ''}" oninput="updateCatName(${i},this.value)">
        <select class="icon-select" onchange="updateCatIcon(${i},this.value)">${iconOpt}</select>
      </div>
      <div class="site-list" data-catidx="${i}" style="display:${cat.expanded ? 'block' : 'none'};">
        ${renderSites(cat.sites || [], i)}
      </div>
    </div>`;
  });

  document.getElementById("categories").innerHTML = html;
  initDrag();
}

function renderSites(sites, catIdx) {
  let h = '';
  sites.forEach((s, j) => {
    h += `
    <div class="site-row" data-site-idx="${j}" data-cat-idx="${catIdx}">
      <input value="${s.logo || ''}" oninput="upSite(${catIdx},j,'logo',this.value)" id="logo-${catIdx}-${j}">
      <button class="btn btn-upload" onclick="openUploadModal('logo-${catIdx}-${j}')">上传</button>
      <input value="${s.name || ''}" oninput="upSite(${catIdx},j,'name',this.value)">
      <input value="${s.url || ''}" oninput="upSite(${catIdx},j,'url',this.value)">
      <input value="${s.desc || ''}" oninput="upSite(${catIdx},j,'desc',this.value)">
      <button class="btn btn-move" onclick="startMoveSite(${catIdx},j)">移</button>
      <button class="btn btn-copy" onclick="startCopySite(${catIdx},j)">复</button>
      <button class="btn btn-danger" onclick="delSite(${catIdx},j)">删</button>
    </div>`;
  });
  return h;
}

function initDrag() {
  document.querySelectorAll(".site-list").forEach(el => {
    new Sortable(el, {
      animation: 150,
      ghostClass: "dragging",
      onEnd: () => {}
    });
  });
}

function toggleCat(i) {
  navConfig.categories[i].expanded = !navConfig.categories[i].expanded;
  render();
}
function updateCatName(i, v) { navConfig.categories[i].name = v; }
function updateCatIcon(i, v) { navConfig.categories[i].icon = v; }
function addSite(catIdx) {
  if (!navConfig.categories[catIdx].sites) navConfig.categories[catIdx].sites = [];
  navConfig.categories[catIdx].sites.push({ logo: "", name: "", url: "", desc: "" });
  render();
}
function delCat(i) {
  if (!confirm("确定删除该分类？")) return;
  navConfig.categories.splice(i, 1);
  render();
}
function upSite(catIdx, j, key, val) {
  navConfig.categories[catIdx].sites[j][key] = val;
}
function delSite(catIdx, j) {
  if (!confirm("确定删除该网站？")) return;
  navConfig.categories[catIdx].sites.splice(j, 1);
  render();
}

// 复制移动逻辑
function startCopySite(catIdx, j) {
  copySite = { catIdx, j };
  renderCopyTarget();
  document.getElementById("copyModal").style.display = "flex";
}
function renderCopyTarget() {
  let html = '';
  navConfig.categories.forEach((cat, i) => {
    html += `<div class="copy-item" data-tocat="${i}" onclick="selCopyTarget(this)">${cat.name || '未命名分类'}</div>`;
  });
  document.getElementById("copyTargets").innerHTML = html;
}
function selCopyTarget(el) {
  document.querySelectorAll(".copy-item").forEach(x => x.classList.remove("selected"));
  el.classList.add("selected");
  copyTarget = parseInt(el.dataset.tocat);
}
function confirmPasteCopy() {
  if (copyTarget === null) { alert("请先选择目标分类"); return; }
  const item = JSON.parse(JSON.stringify(navConfig.categories[copySite.catIdx].sites[copySite.j]));
  if (!navConfig.categories[copyTarget].sites) navConfig.categories[copyTarget].sites = [];
  navConfig.categories[copyTarget].sites.push(item);
  closeCopyModal();
  render();
}
function closeCopyModal() {
  document.getElementById("copyModal").style.display = "none";
  copySite = null; copyTarget = null;
}

function startMoveSite(catIdx, j) {
  movingSite = { catIdx, j };
  renderMoveTarget();
  document.getElementById("moveSiteModal").style.display = "flex";
}
function renderMoveTarget() {
  let html = '';
  navConfig.categories.forEach((cat, i) => {
    html += `<div class="copy-item" data-tocat="${i}" onclick="selMoveTarget(this)">${cat.name || '未命名分类'}</div>`;
  });
  document.getElementById("moveSiteTargets").innerHTML = html;
}
function selMoveTarget(el) {
  document.querySelectorAll(".copy-item").forEach(x => x.classList.remove("selected"));
  el.classList.add("selected");
  moveSiteTarget = parseInt(el.dataset.tocat);
}
function confirmMoveSite() {
  if (moveSiteTarget === null) { alert("请先选择目标分类"); return; }
  const item = navConfig.categories[movingSite.catIdx].sites.splice(movingSite.j, 1)[0];
  if (!navConfig.categories[moveSiteTarget].sites) navConfig.categories[moveSiteTarget].sites = [];
  navConfig.categories[moveSiteTarget].sites.push(item);
  closeMoveSiteModal();
  render();
}
function closeMoveSiteModal() {
  document.getElementById("moveSiteModal").style.display = "none";
  movingSite = null; moveSiteTarget = null;
}

// 上传Logo
function openUploadModal(id) {
  pendingLogoInputEl = id;
  document.getElementById("logoFileInput").value = "";
  document.getElementById("uploadModal").style.display = "flex";
}
function closeUploadModal() {
  document.getElementById("uploadModal").style.display = "none";
  pendingLogoInputEl = null;
}
async function uploadLogo() {
  showStatus("⌛ 上传中...");
  // 先省略上传逻辑，后续我再给你补，不影响配置保存
  alert("Logo上传后续我再给你补齐，现在先能用配置保存");
  closeUploadModal();
}

// 核心：调用CF中转接口保存
async function saveToGitHub() {
  showStatus("⌛ 正在提交到 GitHub...");
  try {
    const res = await fetch("/api/github-proxy", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        owner: GIT_CONF.owner,
        repo: GIT_CONF.repo,
        branch: GIT_CONF.branch,
        path: GIT_CONF.configPath,
        method: "PUT",
        content: JSON.stringify(navConfig, null, 2),
        sha: fileSha
      })
    });
    const data = await res.json();
    if (data.err) throw new Error(data.err);
    fileSha = data.content?.sha || "";
    showStatus("✅ 保存成功！已同步到 GitHub");
    alert("✅ 保存成功，任意设备打开都生效");
  } catch (e) {
    showStatus("❌ 保存失败：" + e.message);
    console.error(e);
  }
}

function showStatus(t) {
  document.getElementById("status").innerText = t;
}

window.onload = function(){
  load();
};
</script>
</body>
</html>
