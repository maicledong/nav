<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航后台｜完整版（含图片上传）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft Yahei", system-ui; background: #f4f6f8; padding: 20px; }
    .wrap { max-width: 1100px; margin: auto; background: white; padding: 24px; border-radius: 12px; }
    h2 { margin-bottom: 16px; }
    .section { border: 1px solid #e5e7eb; padding: 16px; margin: 16px 0; border-radius: 8px; background: white; }
    .sub-section { border: 1px dashed #d1d5db; padding: 12px; margin: 10px 0; border-radius: 6px; background: #f9fafb; }
    input { width: 100%; padding: 6px 10px; margin: 4px 0; border: 1px solid #e5e7eb; border-radius: 6px; }
    .site-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 40px 40px 60px 60px; gap: 6px; padding: 6px; align-items: center; background: white; border: 1px solid #eee; border-radius: 6px; margin-top: 4px; }
    .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; margin: 2px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-copy { background: #f59e0b; color: white; }
    .btn-upload { background: #10b981; color: white; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .copy-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    .copy-item:hover { background: #f3f4f6; }
    #status { margin: 10px 0; font-weight: bold; color: #2563eb; }
    .dragging { opacity: 0.5; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>🧭 导航后台管理</h2>
  <input type="file" id="pemFile" accept=".pem">
  <button class="btn btn-primary" onclick="importPEM()">🔑 导入私钥</button>
  <button class="btn btn-primary" onclick="saveToGitHub()">💾 一键保存到 GitHub</button>
  <div id="status"></div>
  <div id="categories"></div>
</div>

<!-- 图片上传弹窗 -->
<div class="modal" id="uploadModal">
  <div class="modal-box">
    <h3>上传网站 Logo</h3>
    <input type="file" id="logoFileInput" accept="image/*">
    <div style="margin-top:12px">
      <button class="btn btn-upload" onclick="uploadLogo()">上传并填充路径</button>
      <button class="btn" onclick="closeUploadModal()">取消</button>
    </div>
  </div>
</div>

<!-- 复制目标弹窗 -->
<div class="modal" id="copyModal">
  <div class="modal-box">
    <h3>选择目标位置</h3>
    <div id="copyTargets"></div>
    <button class="btn" onclick="closeCopyModal()" style="margin-top:12px">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.8.6/lib/jsrsasign-all-min.js"></script>

<script>
var GITHUB_CONFIG = {
  APP_ID: "3663516",
  OWNER: "maicledong",
  REPO: "nav",
  BRANCH: "master",
  LOGO_DIR: "assets/images/logos/"
};

var navConfig = { categories: [] };
var privateKey = null;
var copySite = null;
var pendingLogoInputEl = null; // 用于存储等待填充路径的输入框

// =============================================
// 私钥 & JWT & 安装令牌
// =============================================
function importPEM() {
  const file = document.getElementById('pemFile').files[0];
  if (!file) return alert('请选择 pem 文件');
  const reader = new FileReader();
  reader.onload = e => {
    privateKey = e.target.result;
    showStatus('✅ 私钥导入成功');
  };
  reader.readAsText(file);
}

function getJWT() {
  const now = Math.floor(Date.now() / 1000);
  return KJUR.jws.JWS.sign('RS256',
    JSON.stringify({ alg: 'RS256', typ: 'JWT' }),
    JSON.stringify({ iss: GITHUB_CONFIG.APP_ID, iat: now - 10, exp: now + 300 }),
    privateKey
  );
}

async function getInstallationId(jwt) {
  const r = await fetch('https://api.github.com/app/installations', {
    headers: { Authorization: 'Bearer ' + jwt, Accept: 'application/vnd.github+json' }
  });
  const list = await r.json();
  return list.find(i => i.account.login === GITHUB_CONFIG.OWNER).id;
}

async function getInstallToken(jwt, id) {
  const r = await fetch(`https://api.github.com/app/installations/${id}/access_tokens`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + jwt, Accept: 'application/vnd.github+json' }
  });
  const d = await r.json();
  return d.token;
}

// =============================================
// 渲染界面
// =============================================
async function load() {
  showStatus('⌛ 加载中...');
  const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/nav-config.json`);
  navConfig = await res.json();
  render();
  showStatus('✅ 加载完成');
}

function render() {
  // 大写数字映射表
  const cnNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
  let html = '';

  navConfig.categories.forEach((cat, i) => {
    // 大分类标题：序号 + 分类名
    const bigTitle = `${cnNums[i]}、${cat.name}`;
    html += `
    <div class="section" data-idx="${i}">
      <!-- 标题 + 按钮 横排同行显示 -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <h3 style="margin:0;">${bigTitle}</h3>
        <div style="display:flex; gap:6px; flex-shrink:0;">
          <button class="btn" onclick="addCategoryBefore(${i})">↑ 插入分类</button>
          <button class="btn" onclick="addCategoryAfter(${i})">↓ 插入分类</button>
          <button class="btn btn-primary" onclick="addSite(${i},-1)">➕ 添加网站</button>
          <button class="btn" onclick="deleteCategory(${i})">🗑 删除</button>
        </div>
      </div>

      <input placeholder="分类名" value="${cat.name}" oninput="navConfig.categories[${i}].name=this.value">
      <input placeholder="图标" value="${cat.icon||''}" oninput="navConfig.categories[${i}].icon=this.value">

      <div class="site-list" data-cat="${i}" data-sub="-1"></div>

      <div style="margin-top:12px">
        <button class="btn" onclick="addSubCategory(${i})">➕ 新增子分类</button>
      </div>
      <div class="sub-list" data-cat="${i}">`;

    // 子分类标题：阿拉伯数字序号 + 子分类名
    (cat.subCategories || []).forEach((sub, k) => {
      const subTitle = `${k + 1}、${sub.name}`;
      html += `
      <div class="sub-section" data-idx="${k}">
        <h4>${subTitle}</h4>
        <input placeholder="子分类名" value="${sub.name}" oninput="navConfig.categories[${i}].subCategories[${k}].name=this.value">
        <div style="margin:6px 0">
          <button class="btn btn-primary" onclick="addSite(${i},${k})">➕ 添加网站</button>
          <button class="btn" onclick="deleteSubCategory(${i},${k})">🗑 删除</button>
        </div>
        <div class="site-list" data-cat="${i}" data-sub="${k}"></div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('categories').innerHTML = html;
  renderAllSites();
  initDrag();
}

function renderAllSites() {
  document.querySelectorAll('.site-list').forEach(el => {
    const cat = el.dataset.cat;
    const sub = el.dataset.sub;
    const list = sub == -1
      ? navConfig.categories[cat].sites || []
      : navConfig.categories[cat].subCategories[sub].sites || [];

    let h = '';
    list.forEach((s, j) => {
      h += `
      <div class="site-row" data-idx="${j}">
        <input value="${s.logo}" oninput="updateSite(${cat},${sub},${j},'logo',this.value)" id="logo-${cat}-${sub}-${j}">
        <button class="btn btn-upload" onclick="openUploadModal('logo-${cat}-${sub}-${j}')">上传</button>
        <input value="${s.name}" oninput="updateSite(${cat},${sub},${j},'name',this.value)">
        <input value="${s.url}" oninput="updateSite(${cat},${sub},${j},'url',this.value)">
        <input value="${s.desc}" oninput="updateSite(${cat},${sub},${j},'desc',this.value)">
        <button class="btn btn-copy" onclick="openCopy(${cat},${sub},${j})">复制</button>
        <button class="btn btn-danger" onclick="deleteSite(${cat},${sub},${j})">删</button>
      </div>`;
    });
    el.innerHTML = h;
  });
}

// =============================================
// 拖拽功能
// =============================================
function initDrag() {
  new Sortable(document.getElementById('categories'), {
    animation: 150,
    ghostClass: 'dragging',
    onEnd: (e) => {
      const t = navConfig.categories;
      t.splice(e.newIndex, 0, t.splice(e.oldIndex, 1)[0]);
      render();
    }
  });

  document.querySelectorAll('.sub-list').forEach(el => {
    const cat = el.dataset.cat;
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      onEnd: (e) => {
        const t = navConfig.categories[cat].subCategories;
        t.splice(e.newIndex, 0, t.splice(e.oldIndex, 1)[0]);
        render();
      }
    });
  });

  document.querySelectorAll('.site-list').forEach(el => {
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      onEnd: (e) => {
        const cat = el.dataset.cat;
        const sub = el.dataset.sub;
        const list = sub == -1
          ? navConfig.categories[cat].sites
          : navConfig.categories[cat].subCategories[sub].sites;
        list.splice(e.newIndex, 0, list.splice(e.oldIndex, 1)[0]);
        renderAllSites();
      }
    });
  });
}

// =============================================
// 增删改功能
// =============================================
function addCategoryBefore(i) {
  navConfig.categories.splice(i, 0, { name: '新分类', icon: '', sites: [], subCategories: [] });
  render();
}
function addCategoryAfter(i) {
  navConfig.categories.splice(i + 1, 0, { name: '新分类', icon: '', sites: [], subCategories: [] });
  render();
}
function deleteCategory(i) {
  if (!confirm('确定删除？')) return;
  navConfig.categories.splice(i, 1);
  render();
}
function addSubCategory(i) {
  if (!navConfig.categories[i].subCategories) navConfig.categories[i].subCategories = [];
  navConfig.categories[i].subCategories.push({ name: '新子分类', sites: [] });
  render();
}
function deleteSubCategory(i, k) {
  if (!confirm('确定删除？')) return;
  navConfig.categories[i].subCategories.splice(k, 1);
  render();
}
function addSite(i, sub) {
  const item = { logo: '', name: '', url: '', desc: '' };
  if (sub === -1) {
    if (!navConfig.categories[i].sites) navConfig.categories[i].sites = [];
    navConfig.categories[i].sites.push(item);
  } else {
    if (!navConfig.categories[i].subCategories[sub].sites) navConfig.categories[i].subCategories[sub].sites = [];
    navConfig.categories[i].subCategories[sub].sites.push(item);
  }
  renderAllSites();
}
function updateSite(cat, sub, idx, key, val) {
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list[idx][key] = val;
}
function deleteSite(cat, sub, idx) {
  if (!confirm('确定删除？')) return;
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list.splice(idx, 1);
  renderAllSites();
}

// =============================================
// 图片上传功能（核心）
// =============================================
function openUploadModal(inputId) {
  pendingLogoInputEl = document.getElementById(inputId);
  document.getElementById('logoFileInput').value = '';
  document.getElementById('uploadModal').style.display = 'flex';
}

function closeUploadModal() {
  document.getElementById('uploadModal').style.display = 'none';
  pendingLogoInputEl = null;
}

async function uploadLogo() {
  const file = document.getElementById('logoFileInput').files[0];
  if (!file) return alert('请选择图片文件');
  if (!privateKey) return alert('请先导入私钥！');

  const fileName = file.name;
  const filePath = GITHUB_CONFIG.LOGO_DIR + fileName;

  showStatus(`⌛ 正在上传 ${fileName}...`);

  try {
    // 读取文件为base64
    const reader = new FileReader();
    const fileBase64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // 获取令牌
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    // 获取文件SHA（如果已存在）
    let sha = null;
    try {
      const shaRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filePath}?ref=${GITHUB_CONFIG.BRANCH}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (shaRes.ok) {
        const shaData = await shaRes.json();
        sha = shaData.sha;
      }
    } catch (e) { /* 文件不存在，新建 */ }

    // 上传文件
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filePath}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' },
      body: JSON.stringify({
        message: `Add logo: ${fileName}`,
        content: fileBase64,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    // 自动填充路径到输入框
    if (pendingLogoInputEl) {
      pendingLogoInputEl.value = filePath;
      pendingLogoInputEl.dispatchEvent(new Event('input'));
    }

    showStatus(`✅ ${fileName} 上传成功，路径已自动填充！`);
    closeUploadModal();
  } catch (e) {
    showStatus(`❌ 上传失败: ${e.message}`);
    console.error(e);
  }
}

// =============================================
// 复制功能
// =============================================
function openCopy(cat, sub, idx) {
  copySite = { cat, sub, idx };
  const targets = [];
  navConfig.categories.forEach((c, i) => {
    targets.push({ type: 'main', cat: i, name: c.name });
    (c.subCategories || []).forEach((s, k) => {
      targets.push({ type: 'sub', cat: i, sub: k, name: '　　' + s.name });
    });
  });

  const html = targets.map(t => `
    <div class="copy-item" onclick="pasteCopy(${t.cat},${t.sub??-1})">
      ${t.name}
    </div>
  `).join('');

  document.getElementById('copyTargets').innerHTML = html;
  document.getElementById('copyModal').style.display = 'flex';
}

function pasteCopy(tCat, tSub) {
  const { cat, sub, idx } = copySite;
  const sourceList = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  const item = JSON.parse(JSON.stringify(sourceList[idx]));

  if (tSub == -1) {
    navConfig.categories[tCat].sites.push(item);
  } else {
    navConfig.categories[tCat].subCategories[tSub].sites.push(item);
  }

  closeCopyModal();
  renderAllSites();
  showStatus('✅ 复制成功');
}

function closeCopyModal() {
  document.getElementById('copyModal').style.display = 'none';
}

// =============================================
// 提交 GitHub
// =============================================
async function saveToGitHub() {
  if (!privateKey) return alert('请先导入私钥');
  showStatus('⌛ 提交中...');
  try {
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    const path = 'nav-config.json';
    const shaRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}?ref=${GITHUB_CONFIG.BRANCH}`, {
      headers: { Authorization: 'token ' + token }
    });
    const sha = (await shaRes.json()).sha;

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(navConfig, null, 2))));

    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: 'token ' + token },
      body: JSON.stringify({
        message: '更新配置',
        content: content,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    showStatus('✅ 提交成功！');
    alert('✅ 提交成功！');
  } catch (e) {
    showStatus('❌ 提交失败');
    console.error(e);
  }
}

function showStatus(text) {
  document.getElementById('status').innerText = text;
}

// 启动
load();
</script>
</body>
</html>

      <div style="margin:8px 0">
        <button class="btn" onclick="addCategoryBefore(${i})">↑ 插入分类</button>
        <button class="btn" onclick="addCategoryAfter(${i})">↓ 插入分类</button>
        <button class="btn btn-primary" onclick="addSite(${i},-1)">➕ 添加网站</button>
        <button class="btn" onclick="deleteCategory(${i})">🗑 删除</button>
      </div>

      <div class="site-list" data-cat="${i}" data-sub="-1"></div>

      <div style="margin-top:12px">
        <button class="btn" onclick="addSubCategory(${i})">➕ 新增子分类</button>
      </div>
      <div class="sub-list" data-cat="${i}">`;

    (cat.subCategories || []).forEach((sub, k) => {
      html += `
      <div class="sub-section" data-idx="${k}">
        <h4>${sub.name}</h4>
        <input placeholder="子分类名" value="${sub.name}" oninput="navConfig.categories[${i}].subCategories[${k}].name=this.value">
        <div style="margin:6px 0">
          <button class="btn btn-primary" onclick="addSite(${i},${k})">➕ 添加网站</button>
          <button class="btn" onclick="deleteSubCategory(${i},${k})">🗑 删除</button>
        </div>
        <div class="site-list" data-cat="${i}" data-sub="${k}"></div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('categories').innerHTML = html;
  renderAllSites();
  initDrag();
}

function renderAllSites() {
  document.querySelectorAll('.site-list').forEach(el => {
    const cat = el.dataset.cat;
    const sub = el.dataset.sub;
    const list = sub == -1
      ? navConfig.categories[cat].sites || []
      : navConfig.categories[cat].subCategories[sub].sites || [];

    let h = '';
    list.forEach((s, j) => {
      h += `
      <div class="site-row" data-idx="${j}">
        <input value="${s.logo}" oninput="updateSite(${cat},${sub},${j},'logo',this.value)">
        <input value="${s.name}" oninput="updateSite(${cat},${sub},${j},'name',this.value)">
        <input value="${s.url}" oninput="updateSite(${cat},${sub},${j},'url',this.value)">
        <input value="${s.desc}" oninput="updateSite(${cat},${sub},${j},'desc',this.value)">
        <button class="btn btn-copy" onclick="openCopy(${cat},${sub},${j})">复制</button>
        <button class="btn btn-danger" onclick="deleteSite(${cat},${sub},${j})">删</button>
      </div>`;
    });
    el.innerHTML = h;
  });
}

// =============================================
// 拖拽
// =============================================
function initDrag() {
  new Sortable(document.getElementById('categories'), {
    animation: 150,
    ghostClass: 'dragging',
    onEnd: (e) => {
      const t = navConfig.categories;
      t.splice(e.newIndex, 0, t.splice(e.oldIndex, 1)[0]);
      render();
    }
  });

  document.querySelectorAll('.sub-list').forEach(el => {
    const cat = el.dataset.cat;
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      onEnd: (e) => {
        const t = navConfig.categories[cat].subCategories;
        t.splice(e.newIndex, 0, t.splice(e.oldIndex, 1)[0]);
        render();
      }
    });
  });

  document.querySelectorAll('.site-list').forEach(el => {
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      onEnd: (e) => {
        const cat = el.dataset.cat;
        const sub = el.dataset.sub;
        const list = sub == -1
          ? navConfig.categories[cat].sites
          : navConfig.categories[cat].subCategories[sub].sites;
        list.splice(e.newIndex, 0, list.splice(e.oldIndex, 1)[0]);
        renderAllSites();
      }
    });
  });
}

// =============================================
// 增删改
// =============================================
function addCategoryBefore(i) {
  navConfig.categories.splice(i, 0, { name: '新分类', icon: '', sites: [], subCategories: [] });
  render();
}
function addCategoryAfter(i) {
  navConfig.categories.splice(i + 1, 0, { name: '新分类', icon: '', sites: [], subCategories: [] });
  render();
}
function deleteCategory(i) {
  if (!confirm('确定删除？')) return;
  navConfig.categories.splice(i, 1);
  render();
}
function addSubCategory(i) {
  if (!navConfig.categories[i].subCategories) navConfig.categories[i].subCategories = [];
  navConfig.categories[i].subCategories.push({ name: '新子分类', sites: [] });
  render();
}
function deleteSubCategory(i, k) {
  if (!confirm('确定删除？')) return;
  navConfig.categories[i].subCategories.splice(k, 1);
  render();
}
function addSite(i, sub) {
  const item = { logo: '', name: '', url: '', desc: '' };
  if (sub === -1) {
    if (!navConfig.categories[i].sites) navConfig.categories[i].sites = [];
    navConfig.categories[i].sites.push(item);
  } else {
    if (!navConfig.categories[i].subCategories[sub].sites) navConfig.categories[i].subCategories[sub].sites = [];
    navConfig.categories[i].subCategories[sub].sites.push(item);
  }
  renderAllSites();
}
function updateSite(cat, sub, idx, key, val) {
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list[idx][key] = val;
}
function deleteSite(cat, sub, idx) {
  if (!confirm('确定删除？')) return;
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list.splice(idx, 1);
  renderAllSites();
}

// =============================================
// 复制功能
// =============================================
function openCopy(cat, sub, idx) {
  copySite = { cat, sub, idx };
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  const data = JSON.parse(JSON.stringify(list[idx]));

  const targets = [];
  navConfig.categories.forEach((c, i) => {
    targets.push({ type: 'main', cat: i, name: c.name });
    (c.subCategories || []).forEach((s, k) => {
      targets.push({ type: 'sub', cat: i, sub: k, name: '　　' + s.name });
    });
  });

  const html = targets.map(t => `
    <div class="copy-item" onclick="pasteCopy(${t.cat},${t.sub??-1})">
      ${t.name}
    </div>
  `).join('');

  document.getElementById('copyTargets').innerHTML = html;
  document.getElementById('copyModal').style.display = 'flex';
}

function pasteCopy(tCat, tSub) {
  const { cat, sub, idx } = copySite;
  const sourceList = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  const item = JSON.parse(JSON.stringify(sourceList[idx]));

  if (tSub == -1) {
    navConfig.categories[tCat].sites.push(item);
  } else {
    navConfig.categories[tCat].subCategories[tSub].sites.push(item);
  }

  closeCopyModal();
  renderAllSites();
  showStatus('✅ 复制成功');
}

function closeCopyModal() {
  document.getElementById('copyModal').style.display = 'none';
}

// =============================================
// 提交 GitHub
// =============================================
async function saveToGitHub() {
  if (!privateKey) return alert('请先导入私钥');
  showStatus('⌛ 提交中...');
  try {
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    const path = 'nav-config.json';
    const shaRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}?ref=${GITHUB_CONFIG.BRANCH}`, {
      headers: { Authorization: 'token ' + token }
    });
    const sha = (await shaRes.json()).sha;

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(navConfig, null, 2))));

    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: 'token ' + token },
      body: JSON.stringify({
        message: '更新配置',
        content: content,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    showStatus('✅ 提交成功！');
    alert('✅ 提交成功！');
  } catch (e) {
    showStatus('❌ 提交失败');
    console.error(e);
  }
}

function showStatus(text) {
  document.getElementById('status').innerText = text;
}

load();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航后台｜GitHub App 安全版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft Yahei", system-ui; background: #f4f6f8; padding: 20px; }
    .wrap { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px #00000010; }
    h2 { margin-bottom: 20px; color: #222; }
    .hint { color: #666; font-size: 14px; margin-bottom: 15px; }
    .btn-group { margin-bottom: 20px; }
    button { padding: 5px 10px; border: none; border-radius: 5px; background: #167ffc; color: #fff; cursor: pointer; margin-right: 4px; font-size: 13px; }
    .btn-danger { background: #f53f3f; }
    .btn-sort { background: #67c23a; }
    .btn-copy { background: #ff7d00; }
    .btn-insert { background: #28a745; }
    .section { border: 1px solid #e5e5e5; border-radius: 8px; padding: 16px; margin-bottom: 16px; cursor: move; }
    .sub-section { border: 1px dashed #ccc; border-radius: 8px; padding: 14px; margin-top: 10px; background: #fefefe; cursor: move; }
    input { width: 100%; padding: 7px 10px; margin: 5px 0; border: 1px solid #dcdfe6; border-radius: 5px; outline: none; }
    .site-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 36px 36px 46px 50px; gap: 4px; margin: 6px 0; align-items: center; background: #fafafa; padding: 5px; border-radius: 6px; cursor: move; }
    .ctrl-row { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    #status { margin: 16px 0; color: #167ffc; font-weight: bold; }
    .dragging { opacity: 0.5; border: 1px dashed #167ffc; }
    .drop-zone { min-height: 40px; padding: 4px; }
    .big-drop-zone { padding: 8px; }
    .sub-drop-zone { min-height: 50px; padding: 8px; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: #fff; padding: 20px; border-radius: 10px; min-width: 320px; max-height: 80vh; overflow: auto; }
    .modal-box h4 { margin-bottom: 15px; }
    .copy-item { padding: 8px 10px; border-bottom: 1px solid #eee; cursor: pointer; }
    .copy-item:hover { background: #f0f7ff; }
    #authContainer { margin-bottom: 16px; padding: 12px; background: #eefaff; border-radius: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <h2>🧭 导航后台｜GitHub App 安全版</h2>
  <div class="hint">提示：导入 .pem 私钥后即可一键提交</div>

  <div id="authContainer">
    <input type="file" id="pemFile" accept=".pem" style="margin-bottom:10px;">
    <button onclick="importPEM()">🔑 导入私钥（pem）</button>
  </div>

  <div class="btn-group">
    <button onclick="saveToGitHub()">💾 一键保存到 GitHub</button>
  </div>

  <div id="status"></div>
  <div class="big-drop-zone" id="bigContainer"></div>
</div>

<div class="modal" id="copyModal">
  <div class="modal-box">
    <h4>选择复制目标位置</h4>
    <div id="copyList"></div>
    <div style="margin-top:15px;text-align:right;">
      <button onclick="closeCopyModal()" class="btn-danger">关闭</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.8.6/lib/jsrsasign-all-min.js"></script>

<script>
var GITHUB_CONFIG = {
  APP_ID: "3663516",
  OWNER: "maicledong",
  REPO: "nav",
  BRANCH: "master"
};

var navConfig = {};
var currentCopySite = null;
var privateKey = null;

function importPEM() {
  var input = document.getElementById('pemFile');
  if (!input.files.length) return alert('请先选择 pem 私钥文件');
  var reader = new FileReader();
  reader.onload = function(e) {
    privateKey = e.target.result;
    setStatus('✅ 私钥导入成功，现在可以提交');
  };
  reader.readAsText(input.files[0]);
}

function getJwt() {
  if (!privateKey) throw new Error('请先导入 pem 私钥');
  var header = { alg: 'RS256', typ: 'JWT' };
  var payload = {
    iss: GITHUB_CONFIG.APP_ID,
    iat: Math.floor(Date.now() / 1000) - 60,
    exp: Math.floor(Date.now() / 1000) + 600
  };
  return KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), privateKey);
}

async function loadConfig() {
  try {
    var res = await fetch('https://raw.githubusercontent.com/' + GITHUB_CONFIG.OWNER + '/' + GITHUB_CONFIG.REPO + '/' + GITHUB_CONFIG.BRANCH + '/nav-config.json');
    navConfig = await res.json();
    renderAdmin();
    setStatus("✅ 加载配置成功");
  } catch (e) {
    setStatus("❌ 加载配置失败");
  }
}

function renderAdmin() {
  var html = "";
  navConfig.categories.forEach(function(cat, i) {
    html +=
    '<div class="section" data-big-idx="' + i + '">' +
      '<h4>📂 大分类：' + cat.name + '</h4>' +
      '<input value="' + cat.name + '" oninput="navConfig.categories[' + i + '].name=this.value" placeholder="分类名称">' +
      '<input value="' + (cat.icon||'') + '" oninput="navConfig.categories[' + i + '].icon=this.value" placeholder="图标class">' +
      '<div class="ctrl-row">' +
        '<button class="btn-insert" onclick="insertBigBefore(' + i + ')">在上方插入新大类</button>' +
        '<button class="btn-insert" onclick="insertBigAfter(' + i + ')">在下方插入新大类</button>' +
        '<button onclick="addSiteToBig(' + i + ')">➕ 直接添加网站</button>' +
        '<button class="btn-sort" onclick="moveBigUp(' + i + ')">⬆️ 上移</button>' +
        '<button class="btn-sort" onclick="moveBigDown(' + i + ')">⬇️ 下移</button>' +
        '<button class="btn-danger" onclick="delBigCat(' + i + ')">🗑 删除</button>' +
      '</div>' +
      '<div class="drop-zone" id="drop-big-' + i + '" data-cat="' + i + '" data-sub="-1">';
    if (cat.sites && cat.sites.length > 0) {
      cat.sites.forEach(function(s, j) {
        html += siteRow(i, -1, j, s);
      });
    }
    html +=
    '</div><div class="sub-drop-zone" id="sub-drop-zone-' + i + '" data-cat="' + i + '">';
    if (cat.subCategories && cat.subCategories.length > 0) {
      cat.subCategories.forEach(function(sub, k) {
        html +=
        '<div class="sub-section" data-sub-idx="' + k + '" data-parent-cat="' + i + '">' +
          '<h5>📁 子分类：' + sub.name + '</h5>' +
          '<input value="' + sub.name + '" oninput="navConfig.categories[' + i + '].subCategories[' + k + '].name=this.value" placeholder="子分类名称">' +
          '<div class="ctrl-row">' +
            '<button class="btn-insert" onclick="insertSubBefore(' + i + ',' + k + ')">在上方插入新子分类</button>' +
            '<button class="btn-insert" onclick="insertSubAfter(' + i + ',' + k + ')">在下方插入新子分类</button>' +
            '<button onclick="addSiteToSub(' + i + ',' + k + ')">➕ 新增网站</button>' +
            '<button class="btn-sort" onclick="moveSubUp(' + i + ',' + k + ')">⬆️ 上移</button>' +
            '<button class="btn-sort" onclick="moveSubDown(' + i + ',' + k + ')">⬇️ 下移</button>' +
            '<button class="btn-danger" onclick="delSubCat(' + i + ',' + k + ')">🗑 删除子分类</button>' +
          '</div>' +
          '<div class="drop-zone" id="drop-sub-' + i + '-' + k + '" data-cat="' + i + '" data-sub="' + k + '">';
        if (sub.sites && sub.sites.length > 0) {
          sub.sites.forEach(function(s, j) {
            html += siteRow(i, k, j, s);
          });
        }
        html += '</div></div>';
      });
    }
    html += '</div></div>';
  });
  document.getElementById("bigContainer").innerHTML = html;
  initSortable();
}

function siteRow(catIdx, subIdx, siteIdx, site) {
  return '<div class="site-row" data-cat="' + catIdx + '" data-sub="' + subIdx + '" data-site="' + siteIdx + '">' +
    '<input value="' + site.logo + '" oninput="updateSite(' + catIdx + ',' + subIdx + ',' + siteIdx + ',\'logo\',this.value)">' +
    '<input value="' + site.name + '" oninput="updateSite(' + catIdx + ',' + subIdx + ',' + siteIdx + ',\'name\',this.value)">' +
    '<input value="' + site.url + '" oninput="updateSite(' + catIdx + ',' + subIdx + ',' + siteIdx + ',\'url\',this.value)">' +
    '<input value="' + site.desc + '" oninput="updateSite(' + catIdx + ',' + subIdx + ',' + siteIdx + ',\'desc\',this.value)">' +
    '<button class="btn-sort" onclick="moveSiteUp(' + catIdx + ',' + subIdx + ',' + siteIdx + ')">⬆️</button>' +
    '<button class="btn-sort" onclick="moveSiteDown(' + catIdx + ',' + subIdx + ',' + siteIdx + ')">⬇️</button>' +
    '<button class="btn-copy" onclick="openCopyModal(' + catIdx + ',' + subIdx + ',' + siteIdx + ')">复制</button>' +
    '<button class="btn-danger" onclick="delSite(' + catIdx + ',' + subIdx + ',' + siteIdx + ')">删除</button>' +
  '</div>';
}

function insertBigBefore(idx){navConfig.categories.splice(idx,0,{id:"id"+Date.now(),name:"新大分类",icon:"fas fa-folder fa-lg",sites:[],subCategories:[]});renderAdmin();}
function insertBigAfter(idx){navConfig.categories.splice(idx+1,0,{id:"id"+Date.now(),name:"新大分类",icon:"fas fa-folder fa-lg",sites:[],subCategories:[]});renderAdmin();}
function insertSubBefore(catIdx,subIdx){navConfig.categories[catIdx].subCategories.splice(subIdx,0,{id:"id"+Date.now(),name:"新子分类",sites:[]});renderAdmin();}
function insertSubAfter(catIdx,subIdx){navConfig.categories[catIdx].subCategories.splice(subIdx+1,0,{id:"id"+Date.now(),name:"新子分类",sites:[]});renderAdmin();}

function initSortable() {
  new Sortable(document.getElementById("bigContainer"), {
    animation:150, ghostClass:"dragging",
    onEnd:evt=>{
      var oldIdx = evt.oldIndex;
      var newIdx = evt.newIndex;
      var temp = navConfig.categories[oldIdx];
      navConfig.categories[oldIdx] = navConfig.categories[newIdx];
      navConfig.categories[newIdx] = temp;
      renderAdmin();
      setStatus("✅ 大分类拖拽成功");
    }
  });

  document.querySelectorAll('.drop-zone').forEach(function(zone){
    new Sortable(zone,{group:'sites',animation:150,ghostClass:'dragging',
      onEnd:evt=>{
        var fC = parseInt(evt.from.dataset.cat);
        var fS = parseInt(evt.from.dataset.sub);
        var tC = parseInt(evt.to.dataset.cat);
        var tS = parseInt(evt.to.dataset.sub);
        var oI = evt.oldIndex;
        var nI = evt.newIndex;
        var fA = fS === -1 ? navConfig.categories[fC].sites : navConfig.categories[fC].subCategories[fS].sites;
        var it = fA.splice(oI,1)[0];
        var tA = tS === -1 ? navConfig.categories[tC].sites : navConfig.categories[tC].subCategories[tS].sites;
        tA.splice(nI,0,it);
        renderAdmin();
        setStatus("✅ 网站移动成功");
      }
    });
  });

  document.querySelectorAll('.sub-drop-zone').forEach(function(zone){
    new Sortable(zone,{group:'subcats',animation:150,ghostClass:'dragging',
      onEnd:evt=>{
        var fC = parseInt(evt.from.dataset.cat);
        var tC = parseInt(evt.to.dataset.cat);
        var oI = evt.oldIndex;
        var nI = evt.newIndex;
        var s = navConfig.categories[fC].subCategories.splice(oI,1)[0];
        navConfig.categories[tC].subCategories.splice(nI,0,s);
        renderAdmin();
        setStatus("✅ 子分类移动成功");
      }
    });
  });
}

function openCopyModal(catIdx,subIdx,siteIdx){
  currentCopySite={catIdx,subIdx,siteIdx};
  var h="";
  navConfig.categories.forEach(function(c,i){
    h += '<div class="copy-item" data-tc="' + i + '" data-ts="-1">📂 ' + c.name + ' 直属</div>';
    if (c.subCategories) {
      c.subCategories.forEach(function(s,k){
        h += '<div class="copy-item" data-tc="' + i + '" data-ts="' + k + '">  📁 ' + s.name + '</div>';
      });
    }
  });
  document.getElementById("copyList").innerHTML=h;
  document.getElementById("copyModal").style.display="flex";
  document.querySelectorAll(".copy-item").forEach(function(i){
    i.onclick=function(){
      var tc=parseInt(this.dataset.tc);
      var ts=parseInt(this.dataset.ts);
      var src=currentCopySite;
      var arr=src.subIdx===-1 ? navConfig.categories[src.catIdx].sites : navConfig.categories[src.catIdx].subCategories[src.subIdx].sites;
      var cp=JSON.parse(JSON.stringify(arr[src.siteIdx]));
      var tArr=ts===-1 ? (navConfig.categories[tc].sites || []) : (navConfig.categories[tc].subCategories[ts].sites || []);
      tArr.push(cp);
      closeCopyModal();
      renderAdmin();
      setStatus("✅ 复制成功");
    };
  });
}
function closeCopyModal(){document.getElementById("copyModal").style.display="none";}

function moveBigUp(i){if(i===0)return;var temp=navConfig.categories[i];navConfig.categories[i]=navConfig.categories[i-1];navConfig.categories[i-1]=temp;renderAdmin();}
function moveBigDown(i){if(i===navConfig.categories.length-1)return;var temp=navConfig[i];navConfig[i]=navConfig[i+1];navConfig[i+1]=temp;renderAdmin();}
function moveSubUp(c,s){if(s===0)return;var arr=navConfig.categories[c].subCategories;var temp=arr[s];arr[s]=arr[s-1];arr[s-1]=temp;renderAdmin();}
function moveSubDown(c,s){var arr=navConfig.categories[c].subCategories;if(s===arr.length-1)return;var temp=arr[s];arr[s]=arr[s+1];arr[s+1]=temp;renderAdmin();}
function moveSiteUp(c,s,i){var arr=s===-1?navConfig.categories[c].sites:navConfig.categories[c].subCategories[s].sites;if(i===0)return;var temp=arr[i];arr[i]=arr[i-1];arr[i-1]=temp;renderAdmin();}
function moveSiteDown(c,s,i){var arr=s===-1?navConfig.categories[c].sites:navConfig.categories[c].subCategories[s].sites;if(i===arr.length-1)return;var temp=arr[i];arr[i]=arr[i+1];arr[i+1]=temp;renderAdmin();}

function addSiteToBig(c){if(!navConfig.categories[c].sites)navConfig.categories[c].sites=[];navConfig.categories[c].sites.push({name:"新网站",url:"",logo:"assets/default.png",desc:""});renderAdmin();}
function addSiteToSub(c,s){if(!navConfig.categories[c].subCategories[s].sites)navConfig.categories[c].subCategories[s].sites=[];navConfig.categories[c].subCategories[s].sites.push({name:"新网站",url:"",logo:"assets/default.png",desc:""});renderAdmin();}
function updateSite(c,s,i,k,v){if(s===-1)navConfig.categories[c].sites[i][k]=v;else navConfig.categories[c].subCategories[s].sites[i][k]=v;}
function delSite(c,s,i){if(confirm("确定删除？")){if(s===-1)navConfig.categories[c].sites.splice(i,1);else navConfig.categories[c].subCategories[s].sites.splice(i,1);renderAdmin();}}
function delBigCat(i){if(confirm("确定删除大类？")){navConfig.categories.splice(i,1);renderAdmin();}}
function delSubCat(c,s){if(confirm("确定删除子分类？")){navConfig.categories[c].subCategories.splice(s,1);renderAdmin();}}

async function saveToGitHub(){
  try{
    if(!privateKey) return alert("请先导入 pem 私钥！");
    setStatus("⏳ 提交中...");
    var jwt = getJwt();
    var owner = GITHUB_CONFIG.OWNER;
    var repo = GITHUB_CONFIG.REPO;
    var path = "nav-config.json";

    // 修复：添加Accept头，并打印完整错误信息
    var getFile = await fetch("https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path + "?ref=" + GITHUB_CONFIG.BRANCH, {
      headers: {
        "Authorization": "Bearer " + jwt,
        "Accept": "application/vnd.github.v3+json"
      }
    });

    if (!getFile.ok) {
      const err = await getFile.json();
      console.error("API Error:", err);
      throw new Error("获取文件失败: " + err.message + " (状态码: " + getFile.status + ")");
    }

    var resJson = await getFile.json();
    var sha = resJson.sha;

    var content = btoa(unescape(encodeURIComponent(JSON.stringify(navConfig, null, 2))));

    var upload = await fetch("https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path, {
      method: "PUT",
      headers: {
        "Authorization": "Bearer " + jwt,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github.v3+json"
      },
      body: JSON.stringify({
        message: "后台更新配置",
        content: content,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    if (upload.ok) {
      setStatus("✅ 提交成功！等待部署");
      alert("提交成功！导航会在几分钟内更新");
    } else {
      throw new Error("提交失败，状态码：" + upload.status);
    }
  }catch(e){
    setStatus("❌ 错误：" + e.message);
    console.error(e);
  }
}

function setStatus(t){document.getElementById("status").innerText=t;}

window.onload = loadConfig;
