<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航后台｜完整版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft Yahei", system-ui; background: #f4f6f8; padding: 20px; }
    .wrap { max-width: 1100px; margin: auto; background: white; padding: 24px; border-radius: 12px; }
    h2 { margin-bottom: 16px; }
    .section { border: 1px solid #e5e7eb; padding: 16px; margin: 16px 0; border-radius: 8px; background: white; }
    .sub-section { border: 1px dashed #d1d5db; padding: 12px; margin: 10px 0; border-radius: 6px; background: #f9fafb; }
    input { width: 100%; padding: 6px 10px; margin: 4px 0; border: 1px solid #e5e7eb; border-radius: 6px; }
    .site-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 40px 40px 60px 60px 60px; gap: 6px; padding: 6px; align-items: center; background: white; border: 1px solid #eee; border-radius: 6px; margin-top: 4px; }
    .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; margin: 2px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-copy { background: #f59e0b; color: white; }
    .btn-move { background: #6366f1; color: white; }
    .btn-upload { background: #10b981; color: white; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .copy-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    .copy-item:hover { background: #f3f4f6; }
    #status { margin: 10px 0; font-weight: bold; color: #2563eb; }
    .dragging { opacity: 0.5; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>🧭 导航后台管理</h2>
  <input type="file" id="pemFile" accept=".pem">
  <button class="btn btn-primary" onclick="importPEM()">🔑 导入私钥</button>
  <button class="btn btn-primary" onclick="saveToGitHub()">💾 一键保存到 GitHub</button>
  <div id="status"></div>
  <div id="categories"></div>
</div>

<div class="modal" id="uploadModal">
  <div class="modal-box">
    <h3>上传网站 Logo</h3>
    <input type="file" id="logoFileInput" accept="image/*">
    <div style="margin-top:12px">
      <button class="btn btn-upload" onclick="uploadLogo()">上传并填充路径</button>
      <button class="btn" onclick="closeUploadModal()">取消</button>
    </div>
  </div>
</div>

<div class="modal" id="copyModal">
  <div class="modal-box">
    <h3>选择目标位置</h3>
    <div id="copyTargets"></div>
    <button class="btn" onclick="closeCopyModal()" style="margin-top:12px">关闭</button>
  </div>
</div>

<div class="modal" id="moveSiteModal">
  <div class="modal-box">
    <h3>移动网站到</h3>
    <div id="moveSiteTargets"></div>
    <button class="btn" onclick="closeMoveSiteModal()" style="margin-top:12px">关闭</button>
  </div>
</div>

<div class="modal" id="moveSubModal">
  <div class="modal-box">
    <h3>移动子分类至大分类</h3>
    <select id="targetSubCat" style="width:100%; padding:8px; margin:12px 0;"></select>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button class="btn" onclick="closeMoveSubModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmMoveSubCategory()">确认移动</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.8.6/lib/jsrsasign-all-min.js"></script>

<script>
const cnNums = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二', '十三', '十四'];

var GITHUB_CONFIG = {
  APP_ID: "3663516",
  OWNER: "maicledong",
  REPO: "nav",
  BRANCH: "master",
  LOGO_DIR: "assets/images/logos/"
};

var navConfig = { categories: [] };
var privateKey = null;
var copySite = null;
var pendingLogoInputEl = null;
var movingSite = null;
var movingSub = null;

function importPEM() {
  const file = document.getElementById('pemFile').files[0];
  if (!file) return alert('请选择 pem 文件');
  const reader = new FileReader();
  reader.onload = e => {
    privateKey = e.target.result;
    showStatus('✅ 私钥导入成功');
  };
  reader.readAsText(file);
}

function getJWT() {
  const now = Math.floor(Date.now() / 1000);
  return KJUR.jws.JWS.sign('RS256',
    JSON.stringify({ alg: 'RS256', typ: 'JWT' }),
    JSON.stringify({ iss: GITHUB_CONFIG.APP_ID, iat: now - 10, exp: now + 300 }),
    privateKey
  );
}

async function getInstallationId(jwt) {
  const r = await fetch('https://api.github.com/app/installations', {
    headers: { Authorization: 'Bearer ' + jwt, Accept: 'application/vnd.github+json' }
  });
  const list = await r.json();
  return list.find(i => i.account.login === GITHUB_CONFIG.OWNER).id;
}

async function getInstallToken(jwt, id) {
  const r = await fetch(`https://api.github.com/app/installations/${id}/access_tokens`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + jwt, Accept: 'application/vnd.github+json' }
  });
  const d = await r.json();
  return d.token;
}

async function load() {
  showStatus('⌛ 加载中...');
  const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/${GITHUB_CONFIG.BRANCH}/nav-config.json`);
  navConfig = await res.json();
  render();
  showStatus('✅ 加载完成');
}

function render() {
  function generateRandom30() {
    const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
    let id = '';
    for (let i = 0; i < 30; i++) {
      id += chars[Math.floor(Math.random() * chars.length)];
    }
    return id;
  }

  navConfig.categories.forEach((cat) => {
    if (!cat.id || cat.id.length !== 32) {
      cat.id = generateRandom30() + '01';
    }
    if (typeof cat.expanded === 'undefined') {
      cat.expanded = true;
    }
  });

  const idSet = new Set();
  navConfig.categories.forEach(cat => {
    while (idSet.has(cat.id)) {
      cat.id = generateRandom30() + '01';
    }
    idSet.add(cat.id);
  });

  let html = '';

  navConfig.categories.forEach((cat, i) => {
    const bigTitle = `${cnNums[i]}、${cat.name}`;
    const isExpanded = cat.expanded !== false;
    const toggleIcon = isExpanded ? '▼' : '▶';
    const contentDisplay = isExpanded ? '' : 'display: none;';

    html += `
    <div class="section" data-idx="${i}">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <button class="btn" onclick="toggleCategory(${i})" style="width:32px; padding:0; background:none; border:none; font-size:16px; color:#666;">
          ${toggleIcon}
        </button>
        <h3 style="margin:0;">${bigTitle}</h3>
        
        <div style="display:flex; gap:6px;">
          <button class="btn" onclick="addSubCategory(${i})">➕ 新增子分类</button>
          <button class="btn btn-primary" onclick="addSite(${i},-1)">➕ 添加网站</button>
          <button class="btn" onclick="deleteCategory(${i})">🗑 删除</button>
        </div>

        <div style="width:30px;"></div>
        <div style="display:flex; gap:6px; margin-left:auto;">
          <button class="btn" onclick="addCategoryBefore(${i})">↑ 插入上</button>
          <button class="btn" onclick="addCategoryAfter(${i})">↓ 插入下</button>
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-bottom:6px;">
        <input value="${cat.id}" disabled style="background:#f5f5f5; flex:1;">
        <input placeholder="分类名" value="${cat.name}" oninput="navConfig.categories[${i}].name=this.value" style="flex:2;">
        <input placeholder="图标" value="${cat.icon||''}" oninput="navConfig.categories[${i}].icon=this.value" style="flex:1;">
      </div>

      <div class="category-content" style="${contentDisplay}">
        <div class="site-list" data-cat="${i}" data-sub="-1"></div>
        <div class="sub-list" data-cat="${i}">`;

    const subs = cat.subCategories || [];
    subs.forEach((sub, k) => {
      const prefix = cat.id.slice(0, 30);
      const suffixNum = k + 1;
      const suffix = suffixNum.toString().padStart(2, '0');
      sub.id = prefix + suffix;
    });

    subs.forEach((sub, k) => {
      const subTitle = `${k + 1}、${sub.name}`;
      html += `
      <div class="sub-section" data-idx="${k}">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
          <h4 style="margin:0;">${subTitle}</h4>
          <button class="btn" onclick="openMoveSubCategory(${i},${k})">📋 移动</button>
          <div style="display:flex; gap:6px;">
            <button class="btn btn-primary" onclick="addSite(${i},${k})">➕ 添加网站</button>
            <button class="btn" onclick="deleteSubCategory(${i},${k})">🗑 删除</button>
          </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:6px;">
          <input value="${sub.id}" disabled style="background:#f5f5f5; flex:1;">
          <input placeholder="子分类名" value="${sub.name}" oninput="navConfig.categories[${i}].subCategories[${k}].name=this.value" style="flex:2;">
        </div>

        <div class="site-list" data-cat="${i}" data-sub="${k}"></div>
      </div>`;
    });

    html += `</div></div></div>`;
  });

  document.getElementById('categories').innerHTML = html;
  renderAllSites();
  initDrag();
}

function toggleCategory(i) {
  navConfig.categories[i].expanded = !navConfig.categories[i].expanded;
  render();
}

function renderAllSites() {
  document.querySelectorAll('.site-list').forEach(el => {
    const cat = el.dataset.cat;
    const sub = el.dataset.sub;
    const list = sub == -1
      ? navConfig.categories[cat].sites || []
      : navConfig.categories[cat].subCategories[sub].sites || [];

    let h = '';
    list.forEach((s, j) => {
      h += `
      <div class="site-row" data-idx="${j}">
        <input value="${s.logo}" oninput="updateSite(${cat},${sub},${j},'logo',this.value)" id="logo-${cat}-${sub}-${j}">
        <button class="btn btn-upload" onclick="openUploadModal('logo-${cat}-${sub}-${j}')">上传</button>
        <input value="${s.name}" oninput="updateSite(${cat},${sub},${j},'name',this.value)">
        <input value="${s.url}" oninput="updateSite(${cat},${sub},${j},'url',this.value)">
        <input value="${s.desc}" oninput="updateSite(${cat},${sub},${j},'desc',this.value)">
        
        <button class="btn btn-move" onclick="openMoveSite(${cat},${sub},${j})">移动</button>
        <button class="btn btn-copy" onclick="openCopy(${cat},${sub},${j})">复制</button>
        
        <button class="btn btn-danger" onclick="deleteSite(${cat},${sub},${j})">删</button>
      </div>`;
    });
    el.innerHTML = h;
  });
}

function initDrag() {
  const bigContainer = document.getElementById('categories');
  new Sortable(bigContainer, {
    animation: 150,
    ghostClass: 'dragging',
    onStart: () => {
      document.querySelectorAll('.sub-list, .site-list, .sub-section, .category-content').forEach(el => {
        el.style.display = 'none';
      });
    },
    onEnd: (e) => {
      document.querySelectorAll('.sub-list, .site-list, .sub-section, .category-content').forEach(el => {
        el.style.display = '';
      });
      const list = navConfig.categories;
      list.splice(e.newIndex, 0, list.splice(e.oldIndex, 1)[0]);
      render();
    }
  });

  document.querySelectorAll('.sub-list').forEach(el => {
    const cat = el.dataset.cat;
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      onEnd: (e) => {
        const list = navConfig.categories[cat].subCategories || [];
        list.splice(e.newIndex, 0, list.splice(e.oldIndex, 1)[0]);
        render();
      }
    });
  });

  document.querySelectorAll('.site-list').forEach(el => {
    new Sortable(el, {
      animation: 150,
      ghostClass: 'dragging',
      group: 'sites',
      onEnd: (e) => {
        const cat = el.dataset.cat;
        const sub = el.dataset.sub;
        const list = sub == -1
          ? navConfig.categories[cat].sites
          : navConfig.categories[cat].subCategories[sub].sites;
        list.splice(e.newIndex, 0, list.splice(e.oldIndex, 1)[0]);
        renderAllSites();
      }
    });
  });
}

// ————————————————————————————————
// 网站移动功能（可跨任意分类）
// ————————————————————————————————
function openMoveSite(cat, sub, idx) {
  movingSite = { cat, sub, idx };
  const list = [];
  navConfig.categories.forEach((c, i) => {
    list.push({ t: 'main', cat: i, sub: -1, name: c.name });
    (c.subCategories || []).forEach((s, k) => {
      list.push({ t: 'sub', cat: i, sub: k, name: '　　' + s.name });
    });
  });

  const html = list.map(item => `
    <div class="copy-item" onclick="confirmMoveSite(${item.cat},${item.sub})">
      ${item.name}
    </div>
  `).join('');

  document.getElementById('moveSiteTargets').innerHTML = html;
  document.getElementById('moveSiteModal').style.display = 'flex';
}

function confirmMoveSite(targetCat, targetSub) {
  const { cat, sub, idx } = movingSite;
  const sourceList = sub === -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;

  const item = sourceList.splice(idx, 1)[0];

  if (targetSub === -1) {
    if (!navConfig.categories[targetCat].sites) navConfig.categories[targetCat].sites = [];
    navConfig.categories[targetCat].sites.push(item);
  } else {
    if (!navConfig.categories[targetCat].subCategories[targetSub].sites) {
      navConfig.categories[targetCat].subCategories[targetSub].sites = [];
    }
    navConfig.categories[targetCat].subCategories[targetSub].sites.push(item);
  }

  closeMoveSiteModal();
  renderAllSites();
  showStatus('✅ 网站已移动');
}

function closeMoveSiteModal() {
  document.getElementById('moveSiteModal').style.display = 'none';
}

// ————————————————————————————————
// 子分类移动功能
// ————————————————————————————————
function openMoveSubCategory(fromCatIdx, subIdx) {
  movingSub = { fromCat: fromCatIdx, subIdx };
  const sel = document.getElementById('targetSubCat');
  sel.innerHTML = navConfig.categories.map((c, i) =>
    `<option value="${i}">${cnNums[i]}、${c.name}</option>`
  ).join('');
  document.getElementById('moveSubModal').style.display = 'flex';
}

function confirmMoveSubCategory() {
  const { fromCat, subIdx } = movingSub;
  const toCat = document.getElementById('targetSubCat').value;
  const sourceSubs = navConfig.categories[fromCat].subCategories;
  const moved = sourceSubs.splice(subIdx, 1)[0];

  if (!navConfig.categories[toCat].subCategories) {
    navConfig.categories[toCat].subCategories = [];
  }
  navConfig.categories[toCat].subCategories.push(moved);

  closeMoveSubModal();
  render();
  showStatus('✅ 子分类已移动');
}

function closeMoveSubModal() {
  document.getElementById('moveSubModal').style.display = 'none';
}

// ————————————————————————————————
// 基础功能
// ————————————————————————————————
function addCategoryBefore(i) {
  navConfig.categories.splice(i, 0, { name: '新分类', icon: '', sites: [], subCategories: [], expanded: true });
  render();
}
function addCategoryAfter(i) {
  navConfig.categories.splice(i + 1, 0, { name: '新分类', icon: '', sites: [], subCategories: [], expanded: true });
  render();
}
function deleteCategory(i) {
  if (!confirm('确定删除？')) return;
  navConfig.categories.splice(i, 1);
  render();
}
function addSubCategory(i) {
  if (!navConfig.categories[i].subCategories) navConfig.categories[i].subCategories = [];
  navConfig.categories[i].subCategories.push({ name: '新子分类', sites: [] });
  render();
}
function deleteSubCategory(i, k) {
  if (!confirm('确定删除？')) return;
  navConfig.categories[i].subCategories.splice(k, 1);
  render();
}
function addSite(i, sub) {
  const item = { logo: '', name: '', url: '', desc: '' };
  if (sub === -1) {
    if (!navConfig.categories[i].sites) navConfig.categories[i].sites = [];
    navConfig.categories[i].sites.push(item);
  } else {
    if (!navConfig.categories[i].subCategories[sub].sites) navConfig.categories[i].subCategories[sub].sites = [];
    navConfig.categories[i].subCategories[sub].sites.push(item);
  }
  renderAllSites();
}
function updateSite(cat, sub, idx, key, val) {
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list[idx][key] = val;
}
function deleteSite(cat, sub, idx) {
  if (!confirm('确定删除？')) return;
  const list = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  list.splice(idx, 1);
  renderAllSites();
}

function openUploadModal(inputId) {
  pendingLogoInputEl = document.getElementById(inputId);
  document.getElementById('logoFileInput').value = '';
  document.getElementById('uploadModal').style.display = 'flex';
}
function closeUploadModal() {
  document.getElementById('uploadModal').style.display = 'none';
  pendingLogoInputEl = null;
}
async function uploadLogo() {
  const file = document.getElementById('logoFileInput').files[0];
  if (!file) return alert('请选择图片文件');
  if (!privateKey) return alert('请先导入私钥！');

  const fileName = file.name;
  const filePath = GITHUB_CONFIG.LOGO_DIR + fileName;
  showStatus(`⌛ 正在上传 ${fileName}...`);

  try {
    const reader = new FileReader();
    const fileBase64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    let sha = null;
    try {
      const shaRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filePath}?ref=${GITHUB_CONFIG.BRANCH}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
      });
      if (shaRes.ok) {
        const shaData = await shaRes.json();
        sha = shaData.sha;
      }
    } catch (e) {}

    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${filePath}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' },
      body: JSON.stringify({
        message: `Add logo: ${fileName}`,
        content: fileBase64,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    if (pendingLogoInputEl) {
      pendingLogoInputEl.value = filePath;
      pendingLogoInputEl.dispatchEvent(new Event('input'));
    }

    showStatus(`✅ ${fileName} 上传成功！`);
    closeUploadModal();
  } catch (e) {
    showStatus(`❌ 上传失败: ${e.message}`);
    console.error(e);
  }
}

function openCopy(cat, sub, idx) {
  copySite = { cat, sub, idx };
  const targets = [];
  navConfig.categories.forEach((c, i) => {
    targets.push({ type: 'main', cat: i, name: c.name });
    (c.subCategories || []).forEach((s, k) => {
      targets.push({ type: 'sub', cat: i, sub: k, name: '　　' + s.name });
    });
  });

  const html = targets.map(t => `
    <div class="copy-item" onclick="pasteCopy(${t.cat},${t.sub??-1})">
      ${t.name}
    </div>
  `).join('');

  document.getElementById('copyTargets').innerHTML = html;
  document.getElementById('copyModal').style.display = 'flex';
}
function pasteCopy(tCat, tSub) {
  const { cat, sub, idx } = copySite;
  const sourceList = sub == -1
    ? navConfig.categories[cat].sites
    : navConfig.categories[cat].subCategories[sub].sites;
  const item = JSON.parse(JSON.stringify(sourceList[idx]));

  if (tSub == -1) {
    navConfig.categories[tCat].sites.push(item);
  } else {
    navConfig.categories[tCat].subCategories[tSub].sites.push(item);
  }

  closeCopyModal();
  renderAllSites();
  showStatus('✅ 复制成功');
}
function closeCopyModal() {
  document.getElementById('copyModal').style.display = 'none';
}

async function saveToGitHub() {
  if (!privateKey) return alert('请先导入私钥');
  showStatus('⌛ 提交中...');
  try {
    const jwt = getJWT();
    const installId = await getInstallationId(jwt);
    const token = await getInstallToken(jwt, installId);

    const path = 'nav-config.json';
    const shaRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}?ref=${GITHUB_CONFIG.BRANCH}`, {
      headers: { Authorization: 'token ' + token }
    });
    const sha = (await shaRes.json()).sha;

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(navConfig, null, 2))));

    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.OWNER}/${GITHUB_CONFIG.REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: 'token ' + token },
      body: JSON.stringify({
        message: '更新配置',
        content: content,
        sha: sha,
        branch: GITHUB_CONFIG.BRANCH
      })
    });

    showStatus('✅ 提交成功！');
    alert('✅ 提交成功！');
  } catch (e) {
    showStatus('❌ 提交失败');
    console.error(e);
  }
}

function showStatus(text) {
  document.getElementById('status').innerText = text;
}

load();
</script>
</body>
</html>
