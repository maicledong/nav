<div class="content-site customize-site">
    <h4 class="text-gray text-lg mb-4">

        <span id="friendlink-title">科学上网</span>
    </h4>
    <div class="friendlink text-xs card">
        <div class="card-body" id="friendlink-links">
            <!-- 链接会从配置文件自动渲染在这里 -->
        </div>
    </div>
</div>

<script>
// 友情链接动态渲染（增强版，带错误提示）
async function renderFriendLinks() {
  const linkContainer = document.getElementById('friendlink-links');
  const titleEl = document.getElementById('friendlink-title');

  try {
    // 1. 读取配置文件（先尝试相对路径，再试根路径）
    let res;
    try {
      res = await fetch('./nav-config.json');
    } catch (e) {
      res = await fetch('/nav-config.json');
    }

    if (!res.ok) throw new Error('配置文件加载失败：' + res.status);

    const config = await res.json();

    // 2. 找到友情链接分类
    const friendLinkCat = config.categories.find(cat => cat.id === 'friendlink');

    if (!friendLinkCat) throw new Error('未找到 id="friendlink" 的分类');

    // 3. 更新标题
    titleEl.textContent = friendLinkCat.name;

    // 4. 渲染链接
    linkContainer.innerHTML = '';
    if (!friendLinkCat.sites || friendLinkCat.sites.length === 0) {
      linkContainer.innerHTML = '<span class="text-muted">暂无链接</span>';
      return;
    }

    friendLinkCat.sites.forEach((site, index) => {
      const a = document.createElement('a');
      a.href = site.url;
      a.title = site.desc || '';
      a.target = '_blank';
      a.textContent = site.name;

      linkContainer.appendChild(a);

      if (index < friendLinkCat.sites.length - 1) {
        linkContainer.appendChild(document.createTextNode(' · '));
      }
    });

  } catch (err) {
    // 出错时在页面上显示错误信息，方便排查
    linkContainer.innerHTML = `<span class="text-danger">加载失败：${err.message}</span>`;
    console.error('友情链接渲染错误:', err);
  }
}

<script>
var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
if (night === '1') {
    document.body.classList.remove('io-grey-mode');
    document.body.classList.add('io-black-mode');
} else {
    document.body.classList.remove('io-black-mode');
    document.body.classList.add('io-grey-mode');
}

$(document).ready(function () {
    if (night === '1') {
        $(".switch-dark-mode").attr("data-original-title", "日间模式");
        $(".mode-ico").removeClass("icon-night").addClass("icon-light");
    } else {
        $(".switch-dark-mode").attr("data-original-title", "夜间模式");
        $(".mode-ico").removeClass("icon-light").addClass("icon-night");
    }
});

$("#search-bg").css("background-image", "url(assets/images/bg-dna.jpg)");

function switchNightMode() {
    var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
    if (night === '0') {
        $("#search-bg").css("background-image", "url(assets/images/bg-dna.jpg)");
        document.body.classList.remove('io-grey-mode');
        document.body.classList.add('io-black-mode');
        document.cookie = "night=1;path=/";
        $(".switch-dark-mode").attr("data-original-title", "日间模式");
        $(".mode-ico").removeClass("icon-night").addClass("icon-light");
    } else {
        $("#search-bg").css("background-image", "url(assets/images/bg-dna.jpg)");
        document.body.classList.remove('io-black-mode');
        document.body.classList.add('io-grey-mode');
        document.cookie = "night=0;path=/";
        $(".switch-dark-mode").attr("data-original-title", "夜间模式");
        $(".mode-ico").removeClass("icon-light").addClass("icon-night");
    }
}
</script>

<script>
function updateRuntime() {
    const startTime = new Date("2023-03-17T00:00:00+08:00");
    const now = new Date();
    const diff = now - startTime;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor(diff / (1000 * 60 * 60) % 24);
    const minutes = Math.floor(diff / (1000 * 60) % 60);
    const seconds = Math.floor(diff / 1000 % 60);
    function pad(n) { return n < 10 ? '0' + n : n; }
    const runtime = document.getElementById("runtime");
    if (runtime) runtime.innerText = `⏱️ 已稳定运行 ${days}天 ${pad(hours)}时 ${pad(minutes)}分 ${pad(seconds)}秒`;
}
setInterval(updateRuntime, 1000);
updateRuntime();
</script>

<script>
$(function () {
    $('input[name="type"]').on('change', function () {
        var val = $(this).val();
        var placeholderText = $(this).data('placeholder');
        if (val === 'local') {
            $('.super-search-fm').attr('onsubmit', 'return false');
            $('#search-text').attr('placeholder', '选择「站内」输入即可自动检索本站工具卡片...');
        } else {
            $('.super-search-fm').removeAttr('onsubmit');
            $('#search-text').attr('placeholder', placeholderText);
        }
    });

    $('#search-text').on('input', function () {
        if ($('#type-local').is(':checked')) {
            var kw = $(this).val().toLowerCase().trim();
            if (kw) {
                $('.url-card').filter(function () {
                    $(this).toggle($(this).text().toLowerCase().includes(kw));
                });
                var showNum = $('.url-card:visible').length;
                $('#site-search-empty').toggle(showNum === 0);
            } else {
                $('.url-card').show();
                $('#site-search-empty').hide();
            }
        }
    });
});
</script>

<script>
let navConfig = {};
async function initNav(){
    const res = await fetch("./nav-config.json");
    navConfig = await res.json();
    renderSidebar();
    renderContent();
}

// ✅ 动态渲染侧边栏：完整还原 change‑href、箭头、子菜单结构
function renderSidebar(){
    let html = "";
    navConfig.categories.forEach(cat=>{
        if(!cat.subCategories){
            // 无下级分类
            html += `
            <li class="sidebar-item">
                <a href="#${cat.id}" class="smooth">
                    <i class="${cat.icon} fa-lg icon-fw icon-lg mr-2"></i>
                    <span>${cat.name}</span>
                </a>
            </li>
            `;
        }else{
            // 有下级分类：保留原版 change‑href + 箭头图标
            html += `
            <li class="sidebar-item">
                <a href="#${cat.id}" class="smooth change-href" data-change="#${cat.id}">
                    <i class="${cat.icon} fa-lg icon-fw icon-lg mr-2"></i>
                    <span>${cat.name}</span>
                    <i class="iconfont icon-arrow-r-m sidebar-more text-sm"></i>
                </a>
                <ul>
            `;
            cat.subCategories.forEach(sub=>{
                html += `
                <li><a href="#${sub.id}" class="smooth"><span>${sub.name}</span></a></li>
                `;
            });
            html += `</ul></li>`;
        }
    });
    document.getElementById("sidebarMenuWrap").innerHTML = html;
}

// ✅ 动态渲染内容区：1:1还原原版卡片样式
function renderContent(){
    let html = "";
    navConfig.categories.forEach(cat=>{
        if(cat.sites && cat.sites.length>0){
            html += renderBlock(cat);
        }
        if(cat.subCategories && cat.subCategories.length>0){
            cat.subCategories.forEach(sub=>{
                if(sub.sites && sub.sites.length>0){
                    html += renderBlock(sub);
                }
            });
        }
    });
    document.getElementById("content").innerHTML = document.getElementById("site-search-empty").outerHTML + html;
}

// ✅ 还原原版区块标题 + 卡片布局
function renderBlock(item){
    let html = `
    <div class="d-flex flex-fill">
        <h4 class="text-gray text-lg mb-4" id="${item.id}">
            <i class="site-tag iconfont icon-tag icon-lg mr-1"></i>
            ${item.name}
        </h4>
        <div class="flex-fill"></div>
    </div>
    <div class="row">
    `;
    item.sites.forEach(site=>{
        html += `
<div class="url-card col-6 col-sm-6 col-md-4 col-xl-5a col-xxl-6a"><div class="url-body default"><a href="${site.url}" target="_blank" data-id="" data-url="${site.url}" class="card no-c mb-4" data-toggle="tooltip" data-placement="bottom" data-original-title="${site.desc}"><div class="card-body"><div class="url-content d-flex align-items-center"><div class="url-img mr-2 d-flex align-items-center justify-content-center"><img class="lazy" src="${site.logo}" data-src="${site.logo}" onerror="javascript:this.src='assets/images/logos/default.webp'" alt="${site.name}"></div><div class="url-info flex-fill"><div class="text-sm overflowClip_1"><strong>${site.name}</strong></div><p class="overflowClip_1 m-0 text-muted text-xs">${site.desc}</p></div></div></div></a><a href="${site.url}" class="togo text-center text-muted is-views" data-toggle="tooltip" data-placement="right" title="直达" rel="nofollow"><i class="iconfont icon-goto"></i></a></div></div>
        `;
    });
    html += `</div><br/>`;
    return html;
}

window.onload = initNav;
</script>
